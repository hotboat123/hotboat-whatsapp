<style id="booking-css">
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--deep:#0d2040;--blue:#1a3a6e;
  --coral:#ff5c35;--gold:#f0a500;
  --text:#f0f4ff;--muted:#8899bb;
  --card:#132240;--border:#1e3a6e;
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
#hdr{
  background:linear-gradient(135deg,var(--deep) 0%,var(--blue) 100%);
  text-align:center;padding:1.2rem 1rem 1rem;
  border-bottom:2px solid var(--coral);
}
.logo-img{max-height:120px;max-width:420px;width:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0) invert(1)}
/* Fallback text shown only when logo image is missing */
.logo-wrap{display:none;align-items:center;justify-content:center;gap:.5rem}
.fire{font-size:2.5rem}
.brand{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--text);letter-spacing:.1em}
.sub{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--coral)}
.tagline{margin-top:.4rem;color:var(--muted);font-size:.85rem;font-weight:300}
#main-content{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.2rem}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--coral);letter-spacing:.05em;margin-bottom:1rem}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:400px){.menu-grid{grid-template-columns:1fr}}
.menu-btn{
  background:var(--deep);border:1px solid var(--border);color:var(--text);
  border-radius:var(--r);padding:1rem;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:.3rem;transition:all .2s;
}
.menu-btn:hover,.menu-btn.active{border-color:var(--coral);background:rgba(255,92,53,.1)}
.menu-btn .icon{font-size:1.5rem}
.menu-btn .label{font-weight:600;font-size:.9rem}
.menu-btn .desc{font-size:.75rem;color:var(--muted)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  background:var(--coral);color:#fff;border:none;border-radius:var(--r);
  padding:.85rem 1.8rem;font-size:1rem;font-weight:700;cursor:pointer;
  width:100%;transition:background .2s;
}
.btn:hover{background:#e04520}
.btn-secondary{background:var(--deep);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--blue)}
.steps{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-bottom:1.5rem}
.step-dot{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  color:var(--muted);transition:all .3s;
}
.step-dot.done{background:var(--coral);border-color:var(--coral);color:#fff}
.step-dot.active{border-color:var(--coral);color:var(--coral)}
.step-line{flex:1;height:2px;background:var(--border);max-width:50px}
.step-line.done{background:var(--coral)}
.media-toggle{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:.45rem .9rem;font-size:.8rem;cursor:pointer;width:100%;margin:.5rem 0;transition:border-color .2s}
.media-toggle:hover{border-color:var(--gold);color:var(--gold)}
.media-img{width:100%;border-radius:12px;margin-top:.5rem;display:block;height:auto}
.media-pdf{display:flex;align-items:center;gap:.5rem;background:var(--deep);border:1.5px solid var(--border);border-radius:8px;padding:.55rem .9rem;font-size:.8rem;color:var(--muted);text-decoration:none;margin:.4rem 0;transition:border-color .2s}
.media-pdf:hover{border-color:var(--gold);color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.5rem}
.cal-hdr{text-align:center;font-size:.7rem;font-weight:600;color:var(--muted);padding:.3rem 0}
.cal-day{
  text-align:center;padding:.5rem .2rem;border-radius:8px;cursor:pointer;font-size:.85rem;
  border:1px solid transparent;transition:all .2s;
}
.cal-day.avail{background:rgba(240,165,0,.1);border-color:var(--gold);color:var(--gold)}
.cal-day.avail:hover,.cal-day.selected{background:var(--gold);color:#000;font-weight:700}
.cal-day.past,.cal-day.empty{color:var(--border);cursor:default;pointer-events:none}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.5rem}
.time-btn{
  background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:.65rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.time-btn:hover,.time-btn.selected{background:var(--coral);border-color:var(--coral);color:#fff}
.counter{display:flex;align-items:center;gap:1rem;justify-content:center;margin:.5rem 0}
/* Addon / pack / solicitud aloj — cuenta personas integrada al tema oscuro */
.counter.counter-addon{
  gap:.85rem;margin:.35rem auto .15rem;
  padding:.55rem .85rem;max-width:280px;
  background:rgba(13,32,64,.65);border:1px solid var(--border);border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.counter-addon .counter-val{min-width:2.5rem;text-align:center;font-variant-numeric:tabular-nums}
.counter-btn{
  width:40px;height:40px;border-radius:50%;background:var(--deep);border:1.5px solid var(--border);
  color:var(--text);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.counter-btn:hover{border-color:var(--coral);color:var(--coral)}
.counter-val{font-size:2rem;font-weight:700;min-width:50px;text-align:center}
.price-tag{
  background:rgba(255,92,53,.1);border:1px solid rgba(255,92,53,.3);
  border-radius:var(--r);padding:.75rem 1rem;text-align:center;margin:.5rem 0;
}
.price-big{font-size:1.5rem;font-weight:700;color:var(--coral)}
.price-sub{font-size:.8rem;color:var(--muted)}
.extra-list{display:flex;flex-direction:column;gap:.6rem;margin:.5rem 0}
.extra-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--deep);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;cursor:pointer;
  transition:all .2s;
}
.extra-item.selected{border-color:var(--coral);background:rgba(255,92,53,.1)}
.extra-name{font-size:.9rem;font-weight:600}
.extra-price{font-size:.8rem;color:var(--gold);font-weight:700}
input[type=text],input[type=email],input[type=tel],textarea{
  width:100%;background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:10px;padding:.7rem 1rem;font-size:.95rem;font-family:inherit;
  outline:none;transition:border .2s;
}
input:focus,textarea:focus{border-color:var(--coral)}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.3rem;font-weight:600}
.form-group{margin-bottom:.9rem}
.summary-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.summary-row.total{font-size:1.1rem;font-weight:700;color:var(--coral);border-bottom:none;padding-top:.8rem}
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:#1a3a6e;color:#fff;padding:.8rem 1.5rem;border-radius:30px;
  font-size:.9rem;z-index:999;border:1px solid var(--coral);
}
.toast.hidden{display:none}
.success-icon{font-size:4rem;text-align:center;margin:1rem 0}
.info-box{background:rgba(255,92,53,.08);border:1px solid rgba(255,92,53,.25);border-radius:var(--r);padding:1rem;margin:.5rem 0;font-size:.9rem;line-height:1.6}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cal-nav button{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:.2rem .5rem}
.fp-dark{background:var(--deep)!important;border-color:var(--border)!important;color:var(--text)!important}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--coral)!important;border-color:var(--coral)!important}
.flatpickr-day.inRange{background:rgba(255,92,53,.15)!important;border-color:transparent!important}
.flatpickr-day.startRange,.flatpickr-day.endRange{background:var(--coral)!important;border-color:var(--coral)!important}
#hb-pay-datos-overlay{
  position:fixed;inset:0;z-index:10000;background:rgba(10,22,40,.92);
  display:flex;align-items:center;justify-content:center;padding:1rem;
}
#hb-pay-datos-overlay .hb-pay-inner{margin:0}
</style>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style id="booking-theme-soft">
/* ════════════════════════════════════════════════════════════════
   HotBoat · Tema "SOFT" — generado con ui-ux-pro-max-skill
   Estilo: Soft UI Evolution · Tipografía: Lora + Raleway
   Paleta: verde de marca HotBoat (wellness/orgánico, sin neón)
   Efectos: sombras suaves en capas, transiciones 200-300ms,
   focus visible, prefers-reduced-motion. Solo capa visual.
   ════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&display=swap');

:root{
  --navy:#eef3f0;        /* fondo claro con tinte verde */
  --deep:#ffffff;
  --blue:#e4ece8;
  --coral:#2c7a72;       /* PRIMARIO verde de marca */
  --gold:#c98a3c;        /* acento cálido sobrio (precios/extra) */
  --text:#1f2a28;        /* texto profundo, contraste AA+ */
  --muted:#6f7d79;
  --card:#ffffff;
  --border:#e3e9e6;
  --r:20px;
  --ring:rgba(44,122,114,.35);
  --shadow-sm:0 1px 2px rgba(31,42,40,.05);
  --shadow-md:0 6px 16px -8px rgba(31,42,40,.18), 0 2px 6px -4px rgba(31,42,40,.10);
  --shadow-lg:0 22px 48px -24px rgba(31,42,40,.30), 0 6px 16px -10px rgba(31,42,40,.14);
}

*{transition-timing-function:cubic-bezier(.4,0,.2,1)}

body{
  font-family:'Raleway',sans-serif;
  background:
    radial-gradient(900px 460px at 50% -8%, rgba(44,122,114,.08), transparent 60%),
    var(--navy);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* Foco visible para navegación por teclado (checklist) */
a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,
.menu-btn:focus-visible,.time-btn:focus-visible,.cal-day:focus-visible,.extra-item:focus-visible{
  outline:3px solid var(--ring);outline-offset:2px;border-radius:12px;
}
/* Cursor en clicables (checklist) */
.menu-btn,.btn,.btn-secondary,.time-btn,.cal-day.avail,.extra-item,.counter-btn,
.media-toggle,.cal-nav button,#btn-home{cursor:pointer}

/* ── Header: banda verde suave, wordmark serif ── */
#hdr{
  background:linear-gradient(135deg,#2f857c 0%, #246b64 100%);
  border-bottom:none;padding:1.3rem 1rem 1.15rem;
  box-shadow:var(--shadow-md);
}
.logo-img{filter:brightness(0) invert(1);max-height:66px}
.brand{font-family:'Lora',serif;font-weight:600;letter-spacing:.03em;color:#fff}
.sub{font-family:'Lora',serif;color:#fff;opacity:.85}
.tagline{font-family:'Raleway',sans-serif;color:#d6e7e3;font-weight:400;letter-spacing:.06em;font-size:.78rem;margin-top:.4rem}

/* ── Cards: Soft UI, sombra suave en capas ── */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  box-shadow:var(--shadow-lg);padding:1.7rem;
}
.card-title{
  font-family:'Lora',serif;font-weight:600;font-size:1.6rem;letter-spacing:.005em;
  color:var(--text);text-transform:none;
}

/* ── Step tracker ── */
.step-dot{width:34px;height:34px;border:2px solid #d3ddd9;background:#fff;color:#9aa8a3;font-weight:700;box-shadow:var(--shadow-sm)}
.step-dot.done,.step-dot.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:0 4px 12px -4px rgba(44,122,114,.5)}
.step-line{height:2px;background:#d3ddd9}
.step-line.done{background:var(--coral)}

/* ── Menú: tarjetas soft ── */
.menu-btn{
  background:#fff;border:1px solid var(--border);border-radius:18px;padding:1.2rem;
  color:var(--text);box-shadow:var(--shadow-sm);
  transition:transform .22s,box-shadow .22s,border-color .22s;
}
.menu-btn:hover,.menu-btn.active{
  border-color:rgba(44,122,114,.4);transform:translateY(-3px);box-shadow:var(--shadow-md);
}
.menu-btn .label{font-weight:700;color:var(--text)}
.menu-btn .desc{display:none}

/* ── Botón primario: pastilla verde con profundidad suave ── */
.btn{
  background:linear-gradient(180deg,#34897f,#2c7a72);color:#fff;font-weight:700;letter-spacing:.01em;
  text-transform:none;font-size:1rem;border-radius:50px;padding:1rem 1.8rem;
  box-shadow:0 10px 22px -10px rgba(44,122,114,.6), inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .2s,box-shadow .2s,filter .2s;
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.04);box-shadow:0 16px 30px -12px rgba(44,122,114,.65)}
.btn:active{transform:translateY(0)}
.btn-secondary{
  background:#fff;border:1.5px solid var(--coral);color:var(--coral);border-radius:50px;
  box-shadow:var(--shadow-sm);background-image:none;
}
.btn-secondary:hover{background:rgba(44,122,114,.06);transform:translateY(-2px)}

/* ── Calendario ── */
.cal-hdr{color:var(--muted);font-weight:700}
.cal-day{color:var(--text);border-radius:12px;transition:background .18s,color .18s}
.cal-day.avail{background:transparent;border-color:transparent;color:var(--text);font-weight:600}
.cal-day.avail:hover{background:#e2ece8}
.cal-day.selected,.cal-day.avail:active{background:var(--coral);color:#fff;font-weight:700;border-color:var(--coral);box-shadow:0 6px 14px -6px rgba(44,122,114,.55)}
.cal-day.past,.cal-day.empty{color:#c4cecb}
.cal-nav button{color:var(--text)}

/* ── Horarios: pastillas soft ── */
.time-grid{gap:.7rem}
.time-btn{
  background:#fff;border:1.5px solid #dbe3df;color:var(--text);border-radius:50px;padding:.85rem;font-weight:600;
  box-shadow:var(--shadow-sm);transition:transform .18s,border-color .18s,box-shadow .18s,background .18s;
}
.time-btn:hover{border-color:rgba(44,122,114,.5);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.time-btn.selected{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:700;box-shadow:0 8px 18px -8px rgba(44,122,114,.55)}

/* ── Contador ── */
.counter.counter-addon{background:#f3f7f5;border:1px solid var(--border);box-shadow:inset 0 1px 0 rgba(255,255,255,.6);border-radius:18px}
.counter-btn{width:44px;height:44px;background:#fff;border:1.5px solid #d3ddd9;color:var(--text);box-shadow:var(--shadow-sm)}
.counter-btn:hover{border-color:var(--coral);color:var(--coral);transform:translateY(-1px)}
.counter-val{color:var(--text);font-weight:800;font-family:'Lora',serif}

/* ── Precio ── */
.price-tag{background:linear-gradient(180deg,#f4f8f6,#eef4f1);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm)}
.price-big{color:#235e58;font-family:'Lora',serif;font-weight:700;font-size:1.8rem}
.price-sub{color:var(--muted)}

/* ── Extras ── */
.extra-item{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);transition:transform .18s,border-color .18s,box-shadow .18s}
.extra-item:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.extra-item.selected{border-color:var(--coral);background:rgba(44,122,114,.05)}
.extra-name{color:var(--text);font-weight:600}
.extra-price{color:var(--gold);font-weight:700}

/* ── Inputs ── */
input[type=text],input[type=email],input[type=tel],textarea{
  background:#fff;border:1.5px solid #dbe3df;color:var(--text);border-radius:14px;box-shadow:var(--shadow-sm);
  transition:border-color .2s,box-shadow .2s;
}
input:focus,textarea:focus{border-color:var(--coral);box-shadow:0 0 0 3px var(--ring)}
label{color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0;font-size:.82rem}

/* ── Resumen ── */
.summary-row{border-bottom:1px solid var(--border);color:var(--text)}
.summary-row.total{color:#235e58;font-family:'Lora',serif;font-weight:700;font-size:1.25rem}

/* ── Varios ── */
.media-toggle{border:1.5px solid #dbe3df;color:var(--muted);border-radius:14px}
.media-toggle:hover{border-color:var(--coral);color:var(--coral)}
.info-box{background:rgba(44,122,114,.06);border:1px solid rgba(44,122,114,.18);color:var(--text);border-radius:16px}
.toast{background:#235e58;border:1px solid #235e58;color:#fff;border-radius:50px;box-shadow:var(--shadow-lg)}
.flatpickr-calendar{background:#fff!important;box-shadow:var(--shadow-lg)!important;border-radius:18px!important;border:1px solid var(--border)!important}
.flatpickr-day{color:var(--text)!important;border-radius:11px!important}
.flatpickr-day.selected,.flatpickr-day.selected:hover,
.flatpickr-day.startRange,.flatpickr-day.endRange{background:var(--coral)!important;border-color:var(--coral)!important;color:#fff!important}
.flatpickr-day.inRange{background:rgba(44,122,114,.12)!important;border-color:transparent!important}
.flatpickr-months .flatpickr-month,.flatpickr-weekday,.flatpickr-current-month{color:var(--text)!important;fill:var(--text)!important}
.flatpickr-day.flatpickr-disabled{color:#c4cecb!important}
#btn-home{background:#fff!important;border-color:var(--coral)!important;color:var(--coral)!important;border-radius:50px!important;box-shadow:var(--shadow-md)!important}
#hb-pay-datos-overlay{background:rgba(31,42,40,.5)!important}

/* Respeta prefers-reduced-motion (checklist) */
@media (prefers-reduced-motion: reduce){
  *{transition:none!important;animation:none!important}
  .menu-btn:hover,.btn:hover,.time-btn:hover,.extra-item:hover,.counter-btn:hover,.btn-secondary:hover{transform:none!important}
}
</style>

<body>
<div id="app">
<header id="hdr">
  <img
    src="/static/logo.png"
    alt="HotBoat Chile"
    class="logo-img"
    onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"
  >
  <div class="logo-wrap" id="logo-fallback">
    <span class="fire">🔥</span>
    <span class="brand">HOTBOAT</span>
    <span class="sub">CHILE</span>
  </div>
  <p class="tagline">Reserva tu experiencia única en Pucón</p>
  <div id="lang-switcher" style="margin-top:.6rem;display:flex;justify-content:center;gap:.4rem"></div>
</header>
<main id="main-content"></main>
<div id="toast" class="toast hidden"></div>
<button id="btn-home" onclick="renderMenu()" aria-label="Volver al menú"
  style="position:fixed;bottom:1.2rem;left:1rem;z-index:999;visibility:hidden;opacity:0;
         background:var(--deep);border:1.5px solid var(--coral);color:var(--coral);
         border-radius:50px;padding:.45rem .9rem;font-size:.8rem;font-weight:700;
         cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.4);
         display:flex;align-items:center;gap:.35rem;transition:opacity .25s,visibility .25s">
  ← Menú
</button>
</div>
<script id="booking-js">
const $ = id => document.getElementById(id);
const mc = document.getElementById('main-content');
function _homeBtn(show){ const b=$('btn-home'); if(!b)return; b.style.visibility=show?'visible':'hidden'; b.style.opacity=show?'1':'0'; }
// Show/hide home button based on whether main menu is visible
new MutationObserver(()=>{
  _homeBtn(!mc.querySelector('.menu-grid'));
}).observe(mc, {childList:true, subtree:false});

const TERMS_URL = 'https://hotboatchile.com/es/terms-conditions/';
const S = {

const _urlParams = new URLSearchParams(window.location.search);
/** Reads query key case-insensitively; trims and caps length. */
function _queryParam(names, maxLen){
  const cap = typeof maxLen==='number'?maxLen:500;
  for(const n of names){
    let v=( _urlParams.get(n)||'' ).trim();
    if(!v){
      const nl=n.toLowerCase();
      for(const [k,val] of _urlParams.entries()){
        if(k.toLowerCase()===nl){ v=(val||'').trim(); break; }
      }
    }
    if(v) return v.substring(0,cap);
  }
  return '';
}

// Dynamic data loaded from API
let DYN_EXPERIENCIAS = [];
let DYN_PACKS = [];
let DYN_ALOJAMIENTOS = [];

async function loadDynamicContent(){
  try{
    const [er, pr, ar, ms] = await Promise.all([
      fetch(`/api/content/experiencias?lang=${encodeURIComponent(LANG||'es')}`).then(r=>r.json()),
      fetch(`/api/content/packs?lang=${encodeURIComponent(LANG||'es')}`).then(r=>r.json()),
      fetch(`/api/content/alojamientos?lang=${encodeURIComponent(LANG||'es')}`).then(r=>r.json()),
      fetch('/api/content/menu-settings').then(r=>r.json()).catch(()=>({})),
    ]);
    if(ms && typeof ms === 'object') S.menuSettings = {...S.menuSettings, ...ms};
    if(er.experiences) DYN_EXPERIENCIAS = er.experiences;
    if(pr.packs) DYN_PACKS = pr.packs;
    if(ar.alojamientos) DYN_ALOJAMIENTOS = ar.alojamientos;
    rebuildAlojamientosFromDyn();

    // Sync ACTIVIDADES for arma-tu-pack using dynamic experiences
    if(DYN_EXPERIENCIAS.length){
      ACTIVIDADES.length = 0;
      ACTIVIDADES.push({id:'hotboat',icon:'🚤',name:'HotBoat',desc:'Paseo 2 horas en el lago',pricePP:76990,flat:false});
      DYN_EXPERIENCIAS.forEach(e=>{
        ACTIVIDADES.push({id:e.slug,icon:e.icon,name:e.name,desc:e.description||'',pricePP:e.price_per_person||0,flat:e.slug==='auto'});
      });
    }
    if(DYN_PACKS.length){
      PACKS.length=0;
      DYN_PACKS.forEach(p=>{
        PACKS.push({id:p.slug,slug:p.slug,icon:p.icon,name:p.name,personas:p.personas,desc:p.description,
          includes:p.includes||[],desde:'Desde $'+Number(p.price_from).toLocaleString('es-CL'),
          price_from:Number(p.price_from||0), image:p.image_path});
      });
    }
  }catch(e){ console.warn('Dynamic content load failed:', e); }
}

const _galState = {};   // gid → current index

function _galBuild(gid, imgs, icon){
  if(!imgs.length)
    return `<div style="text-align:center;font-size:4rem;padding:1.5rem 0;margin-bottom:.5rem">${icon}</div>`;
  if(imgs.length === 1)
    return `<img src="${imgs[0]}" style="width:100%;height:auto;border-radius:10px;margin-bottom:.8rem;display:block"
        onerror="this.outerHTML='<div style=\\'text-align:center;font-size:4rem;padding:1.5rem 0;margin-bottom:.5rem\\'>${icon}</div>'">`;

  _galState[gid] = 0;
  const dots = imgs.map((_,i)=>
    `<span id="${gid}-dot-${i}" style="display:inline-block;width:8px;height:8px;border-radius:50%;
      background:${i===0?'#fff':'rgba(255,255,255,.4)'};transition:background .2s;cursor:pointer"
      onclick="_galGoto('${gid}',${i})"></span>`
  ).join('');

  return `
  <div id="${gid}" style="position:relative;margin-bottom:.8rem;border-radius:10px;overflow:hidden;background:#000;touch-action:pan-y"
       data-imgs='${JSON.stringify(imgs).replace(/'/g,"&#39;")}' data-icon="${icon}">

         onerror="this.src='';this.style.display='none'">

      background:linear-gradient(to right,rgba(0,0,0,.45),transparent);color:#fff;border:none;
      font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">‹</button>
    <button onclick="_galGoto('${gid}',1)" style="position:absolute;right:0;top:0;height:100%;width:44px;
      background:linear-gradient(to left,rgba(0,0,0,.45),transparent);color:#fff;border:none;
      font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">›</button>

/** Normalize experience image_path + DB extra_images (strings or {url}) into deduped URLs */
function _expImagesList(e){
  const out = [];
  if(!e) return out;
  if(e.image_path){
    const p = String(e.image_path).trim();
    if(p) out.push(p);
  }
  let extra = e.extra_images;
  if(typeof extra === 'string'){
    try{ extra = JSON.parse(extra); }catch(_){ extra = []; }
  }
  if(!Array.isArray(extra)) return out;
  extra.forEach(x=>{
    const p = typeof x === 'string' ? String(x).trim() : (x && (x.url || x.path || x.src)) ? String(x.url||x.path||x.src).trim() : '';
    if(p && !out.includes(p)) out.push(p);
  });
  return out;
}

function _galGoto(gid, dir){
  const wrap = document.getElementById(gid);
  if(!wrap) return;
  const imgs = JSON.parse(wrap.dataset.imgs);
  const total = imgs.length;
  let cur = _galState[gid] || 0;
  cur = (cur + dir + total) % total;
  _galState[gid] = cur;
  const imgEl = document.getElementById(gid+'-img');
  if(imgEl){ imgEl.style.opacity='0'; setTimeout(()=>{ imgEl.src=imgs[cur]; imgEl.style.opacity='1'; },150); }
  const ctr = document.getElementById(gid+'-ctr');
  if(ctr) ctr.textContent = `${cur+1} / ${total}`;
  imgs.forEach((_,i)=>{
    const d = document.getElementById(`${gid}-dot-${i}`);
    if(d) d.style.background = i===cur ? '#fff' : 'rgba(255,255,255,.4)';
  });
}

// Touch/swipe support for galleries
(function(){
  let _tx=0;
  document.addEventListener('touchstart',e=>{
    const g=e.target.closest('[data-imgs]'); if(g) _tx=e.touches[0].clientX;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const g=e.target.closest('[data-imgs]'); if(!g) return;
    const dx=e.changedTouches[0].clientX - _tx;
    if(Math.abs(dx)>40) _galGoto(g.id, dx<0?1:-1);
  },{passive:true});
})();

/** @type {object[]} Lines: experience_slug, experience_name, start_date, end_date, num_people, price_per_person, notes, cart_id (+ optional customer_*) */
let _experienceCart = [];

function _expCartPersist(){
  try{ localStorage.setItem(EXP_CART_LS_KEY, JSON.stringify(_experienceCart)); }catch(_e){}
}
function _expCartLoad(){
  try{
    const raw = localStorage.getItem(EXP_CART_LS_KEY);
    if(raw) _experienceCart = JSON.parse(raw);
    if(!Array.isArray(_experienceCart)) _experienceCart = [];
    _experienceCart.forEach(li=>{
      if(li.pack_slug) li.kind = 'pack';
      else if(!li.kind) li.kind = 'experience';
    });
  }catch(_e){ _experienceCart = []; }
}
function appendExperienceCartLine(line){
  /* Recargar desde LS para no pisar líneas agregadas en otra pestaña / sesión paralela */
  _expCartLoad();
  const row = { ...line };
  if(!row.kind) row.kind = row.pack_slug ? 'pack' : 'experience';
  row.cart_id = ('ec'+Date.now()+Math.random().toString(36).slice(2,10)).replace(/\./g,'').slice(0,22);
  _experienceCart.push(row);
  _expCartPersist();
}
function removeExperienceCartLine(cid){
  _expCartLoad();
  _experienceCart = _experienceCart.filter(x=>String(x.cart_id)!==String(cid));
  _expCartPersist();
}

/** Match server experience-create / pack-create inclusive day span */
function _addonComputeDays(checkInIso, checkOutIso){
  if(!checkInIso||!checkOutIso) return 0;
  if(checkOutIso < checkInIso) return -1;
  const start = new Date(checkInIso+'T12:00:00');
  const end   = new Date(checkOutIso+'T12:00:00');
  if(checkInIso===checkOutIso) return 1;
  return Math.round((end - start) / 86400000) + 1;
}

/** Pending experience/pack payloads may omit end_date when same calendar day */
function _addonDaysFromRange(startIso, endIsoMaybe){
  if(!startIso) return 1;
  return _addonComputeDays(startIso, endIsoMaybe || startIso);
}

function _fpLocaleObj(){

function _initAlojFlatpickr(){
  const {fullyBooked} = _alojState;
  // Only disable dates where ALL units are taken
  const disableFn = date => fullyBooked.has(flatpickr.formatDate(date,'Y-m-d'));
  const fpCfg = {
    minDate:'today', dateFormat:'Y-m-d',
    altInput:true, altFormat:'d/m/Y',
    locale: _fpLocaleObj(), disable:[disableFn],
    disableMobile:true,
  };
  let fpOut;
  const fpIn = flatpickr('#aloj-checkin', {
    ...fpCfg,
    onChange(sel){
      if(!sel.length) return;
      _alojState.checkIn = flatpickr.formatDate(sel[0],'Y-m-d');
      _alojState.checkOut = null;
      document.getElementById('aloj-booking-result').innerHTML='';
      document.getElementById('aloj-nights-label').textContent='';
      const minOut = new Date(sel[0]); minOut.setDate(minOut.getDate()+1);
      fpOut.set('minDate', minOut);
      fpOut.clear();
      setTimeout(()=>fpOut.open(), 120);
    }
  });
  fpOut = flatpickr('#aloj-checkout', {
    ...fpCfg,
    minDate: new Date(Date.now()+86400000),
    onChange(sel){
      if(!sel.length||!_alojState.checkIn) return;
      _alojState.checkOut = flatpickr.formatDate(sel[0],'Y-m-d');
      const nights = Math.round((sel[0]-new Date(_alojState.checkIn))/86400000);
      _alojState.nights = nights;
      document.getElementById('aloj-nights-label').textContent = t('alojNightsLabel', nights);
      _onAlojDatesSelected();
    }
  });
}

function _isRangeBlocked(checkIn, checkOut, blockedRanges){
  for(const r of blockedRanges){

  return false;
}

function _adjPeoplePicker(inputId, delta, callback){
  const hid = document.getElementById(inputId);
  if(!hid) return;
  const mn = parseInt(hid.getAttribute('data-min')||'1',10);
  const mx = parseInt(hid.getAttribute('data-max')||'99',10);
  let n = parseInt(hid.value||String(mn),10)||mn;
  n = Math.max(mn, Math.min(mx, n + delta));
  hid.value = String(n);
  const disp = document.getElementById(inputId + '-display');
  if(disp) disp.textContent = n;
  if(typeof callback === 'function') callback();
}

async function _submitAlojSolicitud(){

  const phone=(document.getElementById('as-phone')?.value||'').trim();
  if(!name||!phone){showToast(t('alojNeedNamePhone'));return;}
  const btn=document.getElementById('as-btn');
  if(btn){btn.disabled=true;btn.textContent=t('alojSending');}
  const {a,checkIn,checkOut} = _alojState;
  try{
    const r = await fetch('/api/booking/solicitud',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        customer_name:name, customer_phone:phone,
        customer_email:document.getElementById('as-email')?.value||null,
        dates_preference:`${_fmtDate(checkIn)} → ${_fmtDate(checkOut)}`,
        people:document.getElementById('as-people')?.value||'2',
        notes:document.getElementById('as-notes')?.value||'',
        service_type:'alojamiento', title:a.name,

async function _submitAlojBooking(){
  _ensureCustomerOneOffThen(async ()=>{
    const btn = document.getElementById('ab-pay-btn');
    if(btn){btn.disabled=true;btn.textContent=t('alojProcessing');}
    const {alojId,a,checkIn,checkOut,pricePerNight}=_alojState;
    const payload={
      accommodation_id:   alojId,
      accommodation_name: a.name,
      accommodation_slug: a.id,
      check_in:  checkIn,
      check_out: checkOut,
      num_people: a.cap,
      price_per_night: pricePerNight,
      customer_name:  S.customerName.trim(),
      customer_phone: S.customerPhone.trim(),
      customer_email: (S.customerEmail||'').trim()||null,
    };
    try{
      const r = await fetch('/api/booking/accommodation-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if(!r.ok) throw new Error(j.detail || t('alojPayErr'));
      if(j.payment_url){
        window.location.href=j.payment_url;
        return;
      }
      if(j.requires_email){
        const ref=j.booking_ref||'';
        const box=document.getElementById('aloj-booking-result');
        if(box){
          box.innerHTML=`
          <div class="card" style="text-align:center;padding:1.2rem;margin-top:.75rem">
            <div style="font-size:2.8rem;margin-bottom:.8rem">📧</div>
            <div class="card-title">${t('addonHighSeasonTitle')}</div>
            <p style="color:var(--muted);margin-top:.6rem">
              ${t('addonHighSeasonBody')} <strong>info@hotboatchile.com</strong>.
            </p>
            <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${ref}</strong></p>
            <button class="btn btn-secondary" style="margin-top:1rem" onclick="showAlojamientos()">${t('alojMoreOptions')}</button>
          </div>`;
        }
        if(btn){btn.disabled=false;btn.textContent=t('alojPayLodging');}
        return;
      }
      showToast(t('alojPayErr'));
      if(btn){btn.disabled=false;btn.textContent=t('alojPayLodgingShort');}
    }catch(e){
      showToast(t('alojConnErr'));
      if(btn){btn.disabled=false;btn.textContent=t('alojPayLodgingShort');}
    }
  });
}

function _armaTotal(personas){
  const sel = Object.entries(S.armaActividades||{}).filter(([,v])=>v).map(([k])=>k);
  let total = 0;
  sel.forEach(id=>{
    const act = ACTIVIDADES.find(a=>a.id===id);
    if(!act) return;
    total += act.flat ? act.pricePP : act.pricePP * personas;
  });
  if(S.armaAlojamiento){
    const alj = ALOJAMIENTOS.find(a=>a.id===S.armaAlojamiento);
    if(alj){
      // parse "$XX.XXX/noche" → number
      const raw = alj.price.replace(/\./g,'').replace(/[^0-9]/g,'');
      total += parseInt(raw,10)||0;
    }
  }
  return total;
}

async function pagarArmaPack(mitad, total){
  const name  = document.getElementById('ap-name').value.trim();
  const phone = document.getElementById('ap-phone').value.trim();
  const dates = document.getElementById('ap-dates').value.trim();
  if(!name||!phone){ showToast('Ingresa nombre y telefono'); return; }
  const sel = Object.entries(S.armaActividades||{}).filter(([,v])=>v).map(([k])=>k);
  const btn = mc.querySelector('.btn');
  if(btn){ btn.textContent='Procesando...'; btn.disabled=true; }
  try{
    const r = await fetch('/api/booking/arma-pack-pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        customer_name: name,
        customer_phone: phone,
        activities: sel,
        alojamiento: S.armaAlojamiento||'',
        num_people: S.armaPersonas||2,
        dates_preference: dates,
        notes: document.getElementById('ap-notes').value.trim(),
        total_amount: total,
        deposit_amount: mitad,
      }),
    });
    const d = await r.json();
    if(d.payment_url){
      window.location.href = d.payment_url;
    } else if(d.booking_ref){
      // MP not configured or failed — build WhatsApp deep link with payment details
      const actNames = sel.map(id=>ACTIVIDADES.find(a=>a.id===id)?.name||id).join(', ');
      const personas = S.armaPersonas||2;
      const waMsg = encodeURIComponent(
        `Hola! Quiero reservar mi Pack HotBoat 🚤\n`+
        `Ref: ${d.booking_ref}\n`+
        `Actividades: ${actNames}\n`+
        `Personas: ${personas}\n`+
        `Fechas: ${dates||'a coordinar'}\n`+
        `Total: $${total.toLocaleString('es-CL')} · Depósito 50%: $${mitad.toLocaleString('es-CL')}\n`+
        `Nombre: ${name} · Tel: ${phone}`
      );
      const waUrl = `https://wa.me/56975780920?text=${waMsg}`;
      mc.innerHTML = `<div class="card" style="text-align:center;padding:1.5rem">
        <div style="font-size:2.5rem;margin-bottom:.75rem">✅</div>
        <div class="card-title" style="margin-bottom:.5rem">¡Reserva registrada!</div>

async function enviarSolicitud(){
  const name = $('sq-name').value.trim();

  if(!name||!phone){ showToast('Ingresa nombre y telefono'); return; }
  const body = {
    customer_name:name, customer_phone:phone,
    customer_email:$('sq-email').value.trim()||null,
    dates_preference:$('sq-dates').value.trim(),
    people:$('sq-people').value.trim(),
    notes:$('sq-notes').value.trim(),
    service_type:$('sq-ctx').value,
    title:$('sq-title').value,

  try{

  }catch(e){ showToast('Error: '+e.message); }
}

function goReservar(){
  _trackEvent('view_reservar');

function renderCal(){
  const yr=S.calYear, mo=S.calMonth;
  const firstDayJs = new Date(yr, mo, 1).getDay();
  const leadDays = calLeadDaysMonFirst(firstDayJs);
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = '';
  getDays().forEach(d=>{ cells += `<div class="cal-hdr">${d}</div>`; });
  for(let i=0;i<leadDays;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt = new Date(yr,mo,d);
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = dt < today;
    const isAvail = !isPast && S.availability[key] && S.availability[key].length > 0;
    const isSel = S.selectedDate === key;
    let cls = isPast ? 'past' : isAvail ? (isSel ? 'avail selected':'avail') : 'past';
    const click = isAvail ? `onclick="selectDate('${key}')"` : '';
    cells += `<div class="cal-day ${cls}" ${click}>${d}</div>`;
  }

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">${t('calTitle')}</div>
    <div class="cal-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <strong>${getMonths()[mo]} ${yr}</strong>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>
  <button class="btn btn-secondary" onclick="renderMenu()">${t('back')}</button>`;
}

function prevMonth(){
  if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;
  renderCal();
}
function nextMonth(){
  if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;
  renderCal();
}

function selectDate(key){
  S.selectedDate = key;
  S.selectedTime = null;
  _trackEvent('date_selected', key);
  // Fetch dynamic price in background (non-blocking)
  fetch(`/api/booking/dynamic-price?date=${key}&persons=${S.numPeople}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(d){ S.dpMultiplier=d.multiplier||1.0; S.dpEnabled=d.dp_enabled||false; S.dpFactors=d.active_factors||[]; }
    }).catch(()=>{});
  renderTimeSelect();
}

function renderTimeSelect(){
  const avail = S.availability[S.selectedDate] || [];
  const fake  = S.fakeBooked[S.selectedDate] || [];

  // Fake slots override availability: urgency profiles grey out times even if
  // technically available, so the only clickable slots are the profile seeds.
  const toMin = s => { const [h,m]=s.split(':').map(Number); return h*60+m; };
  const availSet = new Set(avail);
  const fakeSet = new Set(fake);
  const allTimes = [...new Set([...avail, ...fakeSet])].sort((a,b)=>toMin(a)-toMin(b));

  const btns = allTimes.map(s => {
    if(fakeSet.has(s)){
      return `<button class="time-btn" disabled style="opacity:.45;cursor:not-allowed;filter:grayscale(1);background:var(--border);color:var(--muted);border-color:var(--border)">${s} 🔒</button>`;
    }
    return `<button class="time-btn ${S.selectedTime===s?'selected':''}" onclick="selectTime('${s}')">${s}</button>`;
  }).join('');

  const [yr,mo,dy] = S.selectedDate.split('-');
  const d = new Date(yr,mo-1,dy);
  const dayStr = getDays()[(d.getDay()+6)%7]+' '+dy+'/'+mo+'/'+yr;

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">${t('timeTitle')}</div>
    <p style="color:var(--muted);margin-bottom:.8rem">📅 ${dayStr}</p>
    <div class="time-grid">${btns}</div>
    
  </div>
  <button class="btn btn-secondary" onclick="renderCal()">← ${t('back')}</button>`;
}

function selectTime(t){

}

function renderPeopleSelect(){
  function update(){
    const basepp = S.prices[S.numPeople] || 76990;
    const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
    const pp = Math.round(basepp * mult / 1000) * 1000;
    const total = pp * S.numPeople;
    $('pp-val').textContent = S.numPeople;
    $('pp-price').textContent = `$${pp.toLocaleString('es-CL')} por persona`;
    const badge = document.getElementById('dp-badge');
    if(badge){
      if(S.dpEnabled && mult !== 1.0){
        const pct = Math.round((mult-1)*100);

        const col = pct>0?'#e74c3c':'#2ecc71';
        badge.innerHTML = `<span style="background:${col}22;color:${col};border:1px solid ${col}44;border-radius:20px;padding:.2rem .6rem;font-size:.72rem;font-weight:600">${sign}${pct}% precio dinamico</span>`;
        if(S.dpFactors&&S.dpFactors.length) badge.title = S.dpFactors.join(' · ');
      } else {
        badge.innerHTML = '';

  mc.innerHTML = `
  ${stepsHtml('personas')}
  <div class="card">
    <div class="card-title">${t('peopleTitle')}</div>
    <p style="color:var(--muted);margin-bottom:1rem">Min 2 · Max 7 ${t('personsLabel')} · Niños menores de 6 años no pagan</p>

      <button class="counter-btn" onclick="changePeople(1)">+</button>
    </div>
    <div class="price-tag">
      <div class="price-big" id="pp-price"></div>
      <div id="dp-badge" style="margin-top:.3rem"></div>

  <button class="btn" onclick="goExtras()">${t('nextExtras')}</button>

}

          <button onclick="removeExtra('${e.id}')" style="width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:1rem;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center">−</button>

          <span class="extra-price" style="min-width:5rem;text-align:right">+$${(e.price*qty).toLocaleString('es-CL')}</span>

          <span class="extra-price" style="min-width:5rem;text-align:right">+$${e.price.toLocaleString('es-CL')}</span>
        `}
      </div>
    </div>`;

  const flexCls = S.hasFlex ? 'selected' : '';
  // Calculate actual flex price to display (same formula as renderForm)
  const _basepp = S.prices[S.numPeople] || 76990;

  <button class="btn" onclick="renderForm()">${t('nextData')}</button>

async function addExtra(id){
  const e = EXTRAS_CATALOG.find(x=>x.id===id);
  if(e && e.has_variants && !(S.extras[id]>0)){
    await openVariantPicker(id, e.name);
    return;
  }
  S.extras[id] = (S.extras[id] || 0) + 1;
  renderExtras();
}
function removeExtra(id){
  if((S.extras[id] || 0) <= 1){ delete S.extras[id]; delete S.extraVariants[id]; }
  else S.extras[id]--;
  renderExtras();
}

async function openVariantPicker(extraId, extraName){
  const ov = document.getElementById('variant-picker-overlay');
  const body = document.getElementById('variant-picker-body');
  if(!ov||!body) return;
  body.innerHTML = '<p style="color:var(--muted);text-align:center;padding:1rem">Cargando opciones...</p>';
  ov.style.display='flex';
  try{
    const r = await fetch(`/api/content/extras/${encodeURIComponent(extraId)}/variants`).then(x=>x.json());
    const variants = r.variants || [];
    if(!variants.length){
      body.innerHTML='<p style="color:var(--muted);text-align:center;padding:1rem">Sin opciones disponibles</p>';
      return;
    }
    body.innerHTML = variants.map(v=>`
      <button onclick="_pickVariant('${extraId}',${v.product_id},${JSON.stringify(v.label).replace(/"/g,'&quot;')});closeVariantPicker()"
        style="width:100%;padding:.75rem 1rem;background:var(--input);border:1px solid var(--border);border-radius:10px;
               color:var(--text);font-size:.95rem;cursor:pointer;text-align:left;margin-bottom:.4rem">
        ${v.label}
      </button>`).join('');
  }catch(err){
    body.innerHTML=`<p style="color:var(--muted);text-align:center;padding:1rem">Error cargando opciones</p>`;
  }
  document.getElementById('variant-picker-title').textContent = `Elige tu ${extraName}`;
}
function _pickVariant(extraId, productId, label){
  S.extras[extraId] = 1;
  S.extraVariants[extraId] = {product_id: productId, label: label};
  renderExtras();
}
function closeVariantPicker(){
  const ov = document.getElementById('variant-picker-overlay');
  if(ov) ov.style.display='none';
}
function toggleFlex(){
  S.hasFlex = !S.hasFlex;
  renderExtras();
}

function renderForm(){
  window._lastSummaryFn = renderForm;   // so applyCoupon can re-render
  const basepp = S.prices[S.numPeople] || 76990;
  const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
  const pp = Math.round(basepp * mult / 1000) * 1000;
  const sub = pp * S.numPeople;
  let extTotal = 0;
  const extRows = EXTRAS_CATALOG.filter(e=>(S.extras[e.id]||0)>0).map(e=>{
    const qty = S.extras[e.id];
    const linePrice = e.price * qty;
    extTotal += linePrice;
    const vLabel = S.extraVariants[e.id]?.label;
    return `<div class="summary-row"><span>${emoIcon(e.icon, e.name)} ${e.name}${qty>1?` <span style="opacity:.7">×${qty}</span>`:''}</span><span>$${linePrice.toLocaleString('es-CL')}</span></div>${vLabel?`<div class="summary-row" style="font-size:.78rem;color:var(--gold);padding-top:0;margin-top:-.2rem"><span style="padding-left:1.2rem">${emoIcon('🍽')} ${vLabel}</span><span></span></div>`:''}`;

  }).join('');
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  const hbTotal = sub + extTotal + flex - (S.couponDiscount||0);
  const total = hbTotal;
  const [yr,mo,dy] = S.selectedDate.split('-');

  // Accommodation / experiencia / pack summary (addon + HotBoat)
  let alojBlock = '';
  let combinedDepositNote = '';
  /** Lines above HotBoat (cart or single pending pack): shown inside unified “Carrito HotBoat”. */
  let unifiedCartTopInner = '';
  const mergeHbIntoCartCard = !!( _experienceCart.length || _pendingPackBooking );

  if(_pendingAlojBooking){
    const p = _pendingAlojBooking;
    const alojNights = (new Date(p.check_out) - new Date(p.check_in)) / 86400000;
    const alojTotal = p.price_per_night * alojNights;
    const alojDeposit = Math.round(alojTotal * 0.5);
    const hbDeposit = Math.round(hbTotal * 0.5);
    const combinedTotal = hbTotal + alojTotal;
    const combinedDeposit = hbDeposit + alojDeposit;
    const [ciY,ciM,ciD] = p.check_in.split('-');
    const [coY,coM,coD] = p.check_out.split('-');

    <div class="card" style="border-color:var(--coral)">

      <div class="summary-row"><span>$${p.price_per_night.toLocaleString('es-CL')}/noche × ${alojNights}</span><span><strong>$${alojTotal.toLocaleString('es-CL')}</strong></span></div>
      <div class="summary-row" style="color:var(--gold)"><span>Abono alojamiento (50%)</span><span>$${alojDeposit.toLocaleString('es-CL')}</span></div>
    </div>`;
    combinedDepositNote = `
    <div style="background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:10px;padding:.65rem .9rem;margin-top:.75rem;font-size:.8rem;color:var(--muted);line-height:1.5">

      <span style="font-size:.75rem">Alojamiento $${alojDeposit.toLocaleString('es-CL')} + HotBoat $${hbDeposit.toLocaleString('es-CL')} · Total combinado $${combinedTotal.toLocaleString('es-CL')}</span>
    </div>`;

async function applyCoupon(){
  const code = (document.getElementById('coupon-input')?.value||'').trim().toUpperCase();
  const msg = document.getElementById('coupon-msg');
  const btn = document.getElementById('coupon-btn');
  if(!code){ if(msg) msg.textContent=''; return; }

  // Reset if same code re-applied
  S.couponCode = ''; S.couponDiscount = 0; S.couponExtra = ''; S.couponPercent = 0;
  if(btn){ btn.disabled=true; btn.textContent='...'; }

  const pp = S.prices[S.numPeople] || 76990;
  const sub = pp * S.numPeople;   // base boat price only — coupon applies to this
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  // Discount base: only the boat reservation (sub), NOT extras
  const discountBase = sub;

  try{
    const r = await fetch(`/api/booking/coupon/${encodeURIComponent(code)}?booking_date=${S.selectedDate||''}`);
    const d = await r.json();
    if(!r.ok){ if(msg){ msg.style.color='#f87171'; msg.textContent=d.detail||'Cupón no válido'; } }
    else{
      S.couponCode = d.code;
      S.couponExtra = d.extra_description || '';

      // Per-people-count rule overrides global discount if a matching rule exists
      let discPct = d.discount_percent || 0;
      let discFixed = d.discount_fixed || 0;
      if(d.rules && d.rules.length > 0){
        const rule = d.rules.find(r => Number(r.num_people) === S.numPeople);
        if(rule){
          discPct = rule.discount_percent || 0;
          discFixed = rule.discount_fixed || 0;
        }
      }

      S.couponPercent = discPct;
      S.couponDiscount = discFixed > 0
        ? Math.min(discFixed, discountBase)
        : Math.round(discountBase * (discPct / 100));
      if(msg){
        msg.style.color='#4ade80';
        const parts = [];
        if(S.couponDiscount > 0) parts.push(`−$${S.couponDiscount.toLocaleString('es-CL')}`);
        if(discPct > 0) parts.push(`${discPct}% descuento`);
        if(S.couponExtra) parts.push(S.couponExtra);
        msg.textContent = `✅ Cupón aplicado${parts.length?' · '+parts.join(' · '):''}`;}
      // Re-render summary to update totals
      const fn = window._lastSummaryFn;
      if(fn) fn(); else renderSolicitudDatos();
    }
  }catch(e){ if(msg){ msg.style.color='#f87171'; msg.textContent='Error al validar cupón'; } }
  finally{ if(btn){ btn.disabled=false; btn.textContent=LANG==='en'?'Apply':LANG==='pt'?'Aplicar':'Aplicar'; } }
}

function toggleGift(on){S.isGift=!!on;var g=document.getElementById('gift-fields');if(g)g.style.display=on?'block':'none';}

async function submitBooking(){
  if(_isSubmittingBooking) return;
  S.customerName = $('f-name').value.trim();
  S.customerPhone = $('f-phone').value.trim();
  S.customerEmail = $('f-email').value.trim();
  S.customerBirthday = ($('f-birthday')?.value||'').trim()||null;
  if(!S.customerName || !S.customerPhone){
    showToast('Por favor ingresa nombre y telefono');
    return;
  }
  S.isGift = !!(document.getElementById('f-gift') && document.getElementById('f-gift').checked);
  S.termsAccepted = !!(document.getElementById('f-terms') && document.getElementById('f-terms').checked);
  if(S.isGift){
    S.giftTo = (document.getElementById('f-gift-to')?.value||'').trim();
    S.giftMsg = (document.getElementById('f-gift-msg')?.value||'').trim();
    S.giftFrom = (document.getElementById('f-gift-from')?.value||'').trim();
  }
  if(!S.termsAccepted){
    showToast(LANG==='es'?'Debes aceptar los Términos y Condiciones':LANG==='pt'?'Você deve aceitar os Termos e Condições':'You must accept the Terms and Conditions');
    return;
  }
  _isSubmittingBooking = true;
  const basepp = S.prices[S.numPeople] || 76990;
  const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
  const pp = Math.round(basepp * mult / 1000) * 1000;
  const sub = pp * S.numPeople;
  const extrasArr = EXTRAS_CATALOG.filter(e=>(S.extras[e.id]||0)>0).map(e=>({
    name:e.name, price:e.price, quantity:S.extras[e.id],
    ...(S.extraVariants[e.id] ? {variant_label:S.extraVariants[e.id].label, variant_product_id:S.extraVariants[e.id].product_id} : {}),
  }));
  const extTotal = extrasArr.reduce((a,e)=>a+e.price*e.quantity,0);
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  const total = sub + extTotal + flex - (S.couponDiscount||0);

  mc.innerHTML = `<div class="card" style="text-align:center">
    <div style="font-size:2rem;margin:1rem">⏳</div>
    <p>Creando tu reserva...</p>
  </div>`;

  try{
    // Support ?test_price=100 in URL for payment testing
    const testPrice = new URLSearchParams(location.search).get('test_price');
    const payload = {
      customer_name: S.customerName,
      customer_phone: S.customerPhone,
      customer_email: S.customerEmail || null,
      customer_birthday: S.customerBirthday || null,
      customer_language: LANG || 'es',
      booking_date: S.selectedDate,
      booking_time: S.selectedTime,
      num_people: S.numPeople,
      extras: extrasArr,
      has_flex: S.hasFlex,
      coupon_code: S.couponCode || null,
      coupon_discount: S.couponDiscount || 0,
      coupon_extra_benefit: (S.couponExtra || '').trim() || null,
      utm_source: S.utm_source || '',
      utm_medium: S.utm_medium || '',
      utm_campaign: S.utm_campaign || '',
      utm_content: S.utm_content || '',
      parametro_url: S.parametro_url || '',
    };
    if(S.isGift){
      const _gl = ['\u{1F381} REGALO'];
      if(S.giftTo) _gl.push('Para: '+S.giftTo);
      if(S.giftMsg) _gl.push('Dedicatoria: '+S.giftMsg);
      if(S.giftFrom) _gl.push('De parte de: '+S.giftFrom);
      payload.notes = _gl.join('\n');
    }
    if(testPrice) payload.test_price = parseInt(testPrice);
    // If coming from accommodation flow, create HotBoat booking without payment order
    if(_pendingAlojBooking || _experienceCart.length || _pendingPackBooking) payload.skip_payment = true;

    const r = await fetch('/api/booking/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.detail || 'Error');
    S.bookingRef = data.booking_ref;
    S.paymentUrl = data.payment_url;
    S.totalPrice = total;

    if(_pendingAlojBooking){
      // Create combined WooCommerce order: accommodation + HotBoat in one payment
      const alojPayload = { ..._pendingAlojBooking, hotboat_booking_ref: data.booking_ref };
      alojPayload.customer_name = S.customerName;
      alojPayload.customer_phone = S.customerPhone;
      alojPayload.customer_email = S.customerEmail || null;
      const alojNights = (new Date(alojPayload.check_out) - new Date(alojPayload.check_in)) / 86400000;
      _pendingAlojBooking = null;
      const ar = await fetch('/api/booking/accommodation-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(alojPayload)
      });
      const adata = await ar.json();
      if(!ar.ok) throw new Error(adata.detail || 'Error al crear reserva alojamiento');
      S.bookingRef = adata.booking_ref;
      S.paymentUrl = adata.payment_url;
      if(!adata.payment_url && adata.requires_email){
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">${t('addonHighSeasonTitle')}</div>
          <p style="color:var(--muted);margin-top:.6rem">
            ${t('addonHighSeasonBody')} <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${adata.booking_ref}</strong></p>
          <p style="color:var(--muted);margin-top:.5rem;font-size:.82rem">HotBoat: <strong>${data.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">${t('backToMenu')}</button>
        </div>`;
        return;
      }
      // Combined totals: HotBoat + accommodation
      const alojTotal = alojPayload.price_per_night * alojNights;
      const alojDeposit = Math.round(alojTotal * 0.5);
      S.totalPrice = total + alojTotal;           // real combined total
      S.depositAmount = Math.round(total * 0.5) + alojDeposit;  // real combined deposit
    } else if(_experienceCart.length){
      const items = _experienceCart.map(li=>{
        const isPack = li.kind==='pack' || !!li.pack_slug;
        if(isPack){
          return {
            item_type:'pack',
            pack_slug: li.pack_slug,
            pack_name: li.pack_name,
            start_date: li.start_date,
            end_date: li.end_date || null,
            num_people: Math.max(1, Number(li.num_people)||1),
            unit_price_per_person: Number(li.unit_price_per_person)||0,
            notes: (li.notes||'').trim()||null,
          };
        }
        return {
          item_type:'experience',
          experience_slug: li.experience_slug,
          experience_name: li.experience_name,
          start_date: li.start_date,
          end_date: li.end_date || null,
          num_people: Math.max(1, Number(li.num_people)||1),
          price_per_person: Number(li.price_per_person)||0,
          notes: (li.notes||'').trim()||null,
        };
      });
      const er = await fetch('/api/booking/experience-cart-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          items,
          customer_name: S.customerName,
          customer_phone: S.customerPhone,
          customer_email: S.customerEmail||null,
          hotboat_booking_ref: data.booking_ref,
        }),
      });
      const edata = await er.json();
      if(!er.ok) throw new Error(edata.detail || 'Error al crear reserva experiencias');

      const expSumTotal = Number(edata.total_price)||0;

      _experienceCart = [];
      _expCartPersist();

      S.bookingRef = edata.primary_ref || (edata.booking_refs && edata.booking_refs[0]) || data.booking_ref;
      S.paymentUrl = edata.payment_url;
      S.totalPrice = total + expSumTotal;
      S.depositAmount = Math.round(total * 0.5) + Math.round(expSumTotal * 0.5);

      if(!edata.payment_url && edata.requires_email){
        const refs = (edata.booking_refs||[]).join(', ');
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">${t('addonHighSeasonTitle')}</div>
          <p style="color:var(--muted);margin-top:.6rem">
            ${t('addonHighSeasonBody')} <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Refs: <strong>${refs||S.bookingRef}</strong></p>
          <p style="color:var(--muted);margin-top:.5rem;font-size:.82rem">HotBoat: <strong>${data.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">${t('backToMenu')}</button>
        </div>`;
        return;
      }
    } else if(_pendingPackBooking){
      // Create combined WooCommerce order: pack + HotBoat
      const packPayload = { ..._pendingPackBooking, hotboat_booking_ref: data.booking_ref };
      packPayload.customer_name = S.customerName;
      packPayload.customer_phone = S.customerPhone;
      packPayload.customer_email = S.customerEmail || null;
      packPayload.num_people = S.numPeople;
      const start = new Date(packPayload.start_date);
      const end   = packPayload.end_date ? new Date(packPayload.end_date) : null;
      const daysCount = (!end || packPayload.end_date === packPayload.start_date)
        ? 1
        : Math.round((end - start) / 86400000) + 1;
      const packTotal = packPayload.unit_price_per_person * packPayload.num_people * daysCount;
      const packDeposit = Math.round(packTotal * 0.5);

      _pendingPackBooking = null;

      const pr = await fetch('/api/booking/pack-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(packPayload)
      });
      const pdata = await pr.json();
      if(!pr.ok) throw new Error(pdata.detail || 'Error al crear reserva pack');

      S.bookingRef = pdata.booking_ref;
      S.paymentUrl = pdata.payment_url;
      S.totalPrice = total + packTotal;
      S.depositAmount = Math.round(total * 0.5) + packDeposit;

      if(!pdata.payment_url && pdata.requires_email){
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">Alta temporada — Coordinamos por email</div>
          <p style="color:var(--muted);margin-top:.6rem">
            Para confirmar el pack, escribe a <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${pdata.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">Volver al inicio</button>
        </div>`;
        return;
      }
    }

    _trackEvent('booking_completed', S.selectedDate);
    // If tabla extra was selected, redirect through tabla selection flow before payment
    const _tablaExt = EXTRAS_CATALOG.find(e => _isTablaExtra(e));
    if(_tablaExt && (S.extras[_tablaExt.id]||0) > 0){
      const nextUrl = S.paymentUrl || (location.origin + '/');
      window.location.href = `/tabla/${encodeURIComponent(S.bookingRef)}?next=${encodeURIComponent(nextUrl)}`;
      return;
    }
    // Ir directo al checkout de pago (sin pantalla intermedia).
    if(S.paymentUrl){
      window.location.href = S.paymentUrl;
      return;
    }
    renderPayment(); // fallback: sin URL de pago (coordinación por email)
  }catch(e){
    _pendingAlojBooking = null;
    _pendingPackBooking = null;
    mc.innerHTML = `<div class="card"><p style="color:red">Error: ${e.message}</p></div>`;
  }finally{
    _isSubmittingBooking = false;
  }
}

function renderPayment(){
  const [yr,mo,dy] = S.selectedDate.split('-');
  const isCombined = S.bookingRef && S.bookingRef.startsWith('HA-');
  const deposit = S.depositAmount || Math.round(S.totalPrice * 0.5);
  S.depositAmount = 0; // reset after use
  const resto   = S.totalPrice - deposit;
  const subline = isCombined
    ? `Alojamiento + HotBoat · ${S.numPeople}p · ${dy}/${mo}/${yr} ${S.selectedTime}`
    : `${S.numPeople} persona${S.numPeople>1?'s':''} · ${dy}/${mo}/${yr} ${S.selectedTime}`;
  mc.innerHTML = `
  ${stepsHtml('pago')}
  <div class="card" style="text-align:center">
    <div style="font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:.3rem">💳 Pagar Reserva</div>
    <p style="color:var(--muted);margin-bottom:.8rem;font-size:.85rem">Ref: <strong>${S.bookingRef}</strong></p>

    <div style="background:var(--bg);border-radius:12px;padding:1rem;margin:.75rem 0">
      <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem">Depósito ahora (50%)</div>
      <div style="font-size:2rem;font-weight:800;color:var(--gold)">$${deposit.toLocaleString('es-CL')}</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">${subline}</div>
    </div>

    <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:.75rem 1rem;margin:.5rem 0;display:flex;justify-content:space-between;align-items:center;font-size:.85rem">
      <span style="color:var(--muted)">Total experiencia</span>
      <span style="font-weight:700">$${S.totalPrice.toLocaleString('es-CL')}</span>
    </div>
    <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:.75rem 1rem;margin:.5rem 0;display:flex;justify-content:space-between;align-items:center;font-size:.85rem">
      <span style="color:var(--muted)">Saldo al llegar</span>
      <span style="font-weight:700">$${resto.toLocaleString('es-CL')}</span>
    </div>

    <div style="background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:10px;padding:.7rem 1rem;margin:.75rem 0;font-size:.8rem;color:var(--muted);text-align:left">
      ${isCombined
        ? '🏠🚤 El saldo restante se paga <strong>al terminar el paseo en HotBoat</strong>, en efectivo, tarjeta o transferencia.'
        : '🚤 El saldo restante se paga <strong>al terminar el paseo en HotBoat</strong>, en efectivo, tarjeta o transferencia.'}
    </div>

    ${S.paymentUrl ? `
      <a href="${S.paymentUrl}" class="btn" style="text-decoration:none;margin-top:.5rem;font-size:1rem;padding:.9rem">
        Pagar $${deposit.toLocaleString('es-CL')} 💳
      </a>
      <p style="color:var(--muted);font-size:.78rem;margin-top:.7rem">
        Pago seguro · Débito, crédito, Webpay y más
      </p>` : `
      <div class="info-box">
        ✅ Reserva creada. Nos contactaremos a tu WhatsApp para coordinar el pago.
      </div>`}
  </div>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderMenu()">Volver al inicio</button>`;
}

function checkReturnFromPayment(){
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('booking_ref');
  const status = params.get('collection_status') || params.get('payment_status');
  if(ref && status==='approved'){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">🎉</div>
      <div class="card-title">Reserva Confirmada!</div>
      <p style="color:var(--muted);margin:.5rem 0">Ref: <strong>${ref}</strong></p>
      <div class="info-box" style="margin-top:1rem">
        Te enviaremos los detalles por WhatsApp. Nos vemos en el lago! 🚤🔥
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">Nueva reserva</button>`;
    return true;
  }
  if(ref && (status==='failure'||status==='rejected')){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">❌</div>
      <div class="card-title">${t('failTitle')}</div>
      <div class="info-box" style="margin-top:1rem">
        ${t('failMsg', ref)}
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">${t('returnMenu')}</button>`;
    return true;
  }
  return false;
}

async function init(){
  if(!checkReturnFromPayment()){
    renderLangSwitcher();
    mc.innerHTML = `<div class="card" style="text-align:center"><p>${t('loading')}</p></div>`;
    await Promise.all([loadPricesAndAvail(), loadDynamicContent()]);

    // Auto-select date+time from URL params (e.g. links sent by WhatsApp bot)
    const _preDate = _queryParam(['date','fecha']);
    const _preTime = _queryParam(['time','hora']);
    if(_preDate && S.availability[_preDate] && S.availability[_preDate].length > 0){
      selectDate(_preDate);
      if(_preTime && S.availability[_preDate].includes(_preTime)){
        selectTime(_preTime);
      }
    } else {
      renderMenu();
    }

    // Track page exit via sendBeacon (survives page unload)
    window.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='hidden'){
        const d = JSON.stringify({
          event:'exit',
          session_id:_sessionId,
          is_returning:_isReturning,
          lang:S.lang||'es',
          referrer: document.referrer?document.referrer.substring(0,200):'',
          ..._landingAttribution,
        });
        navigator.sendBeacon('/api/booking/track', new Blob([d],{type:'application/json'}));
      }
    });

    // Show test mode banner
    const tp = new URLSearchParams(location.search).get('test_price');
    if(tp){
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f0a500;color:#0a1628;'+
        'text-align:center;padding:.4rem;font-weight:700;font-size:.85rem;z-index:9999;';
      banner.textContent = `🧪 MODO TEST — el pago se procesará por $${parseInt(tp).toLocaleString('es-CL')} CLP`;
      document.body.prepend(banner);
    }
  }
}

init();
</script>
