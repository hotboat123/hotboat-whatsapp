*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--deep:#0d2040;--blue:#1a3a6e;
  --coral:#ff5c35;--gold:#f0a500;
  --text:#f0f4ff;--muted:#8899bb;
  --card:#132240;--border:#1e3a6e;
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
#hdr{
  background:linear-gradient(135deg,var(--deep) 0%,var(--blue) 100%);
  text-align:center;padding:1.2rem 1rem 1rem;
  border-bottom:2px solid var(--coral);
}
.logo-img{max-height:120px;max-width:420px;width:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0) invert(1)}
/* Fallback text shown only when logo image is missing */
.logo-wrap{display:none;align-items:center;justify-content:center;gap:.5rem}
.fire{font-size:2.5rem}
.brand{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--text);letter-spacing:.1em}
.sub{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--coral)}
.tagline{margin-top:.4rem;color:var(--muted);font-size:.85rem;font-weight:300}
#main-content{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.2rem}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--coral);letter-spacing:.05em;margin-bottom:1rem}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:400px){.menu-grid{grid-template-columns:1fr}}
.menu-btn{
  background:var(--deep);border:1px solid var(--border);color:var(--text);
  border-radius:var(--r);padding:1rem;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:.3rem;transition:all .2s;
}
.menu-btn:hover,.menu-btn.active{border-color:var(--coral);background:rgba(255,92,53,.1)}
.menu-btn .icon{font-size:1.5rem}
.menu-btn .label{font-weight:600;font-size:.9rem}
.menu-btn .desc{font-size:.75rem;color:var(--muted)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  background:var(--coral);color:#fff;border:none;border-radius:var(--r);
  padding:.85rem 1.8rem;font-size:1rem;font-weight:700;cursor:pointer;
  width:100%;transition:background .2s;
}
.btn:hover{background:#e04520}
.btn-secondary{background:var(--deep);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--blue)}
.steps{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-bottom:1.5rem}
.step-dot{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  color:var(--muted);transition:all .3s;
}
.step-dot.done{background:var(--coral);border-color:var(--coral);color:#fff}
.step-dot.active{border-color:var(--coral);color:var(--coral)}
.step-line{flex:1;height:2px;background:var(--border);max-width:50px}
.step-line.done{background:var(--coral)}
.media-toggle{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:.45rem .9rem;font-size:.8rem;cursor:pointer;width:100%;margin:.5rem 0;transition:border-color .2s}
.media-toggle:hover{border-color:var(--gold);color:var(--gold)}
.media-img{width:100%;border-radius:12px;margin-top:.5rem;display:block;height:auto}
.media-pdf{display:flex;align-items:center;gap:.5rem;background:var(--deep);border:1.5px solid var(--border);border-radius:8px;padding:.55rem .9rem;font-size:.8rem;color:var(--muted);text-decoration:none;margin:.4rem 0;transition:border-color .2s}
.media-pdf:hover{border-color:var(--gold);color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.5rem}
.cal-hdr{text-align:center;font-size:.7rem;font-weight:600;color:var(--muted);padding:.3rem 0}
.cal-day{
  text-align:center;padding:.5rem .2rem;border-radius:8px;cursor:pointer;font-size:.85rem;
  border:1px solid transparent;transition:all .2s;
}
.cal-day.avail{background:rgba(240,165,0,.1);border-color:var(--gold);color:var(--gold)}
.cal-day.avail:hover,.cal-day.selected{background:var(--gold);color:#000;font-weight:700}
.cal-day.past,.cal-day.empty{color:var(--border);cursor:default;pointer-events:none}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.5rem}
.time-btn{
  background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:.65rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.time-btn:hover,.time-btn.selected{background:var(--coral);border-color:var(--coral);color:#fff}
.counter{display:flex;align-items:center;gap:1rem;justify-content:center;margin:.5rem 0}
.counter-btn{
  width:40px;height:40px;border-radius:50%;background:var(--deep);border:1.5px solid var(--border);
  color:var(--text);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.counter-btn:hover{border-color:var(--coral);color:var(--coral)}
.counter-val{font-size:2rem;font-weight:700;min-width:50px;text-align:center}
.price-tag{
  background:rgba(255,92,53,.1);border:1px solid rgba(255,92,53,.3);
  border-radius:var(--r);padding:.75rem 1rem;text-align:center;margin:.5rem 0;
}
.price-big{font-size:1.5rem;font-weight:700;color:var(--coral)}
.price-sub{font-size:.8rem;color:var(--muted)}
.extra-list{display:flex;flex-direction:column;gap:.6rem;margin:.5rem 0}
.extra-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--deep);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;cursor:pointer;
  transition:all .2s;
}
.extra-item.selected{border-color:var(--coral);background:rgba(255,92,53,.1)}
.extra-name{font-size:.9rem;font-weight:600}
.extra-price{font-size:.8rem;color:var(--gold);font-weight:700}
input[type=text],input[type=email],input[type=tel],textarea{
  width:100%;background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:10px;padding:.7rem 1rem;font-size:.95rem;font-family:inherit;
  outline:none;transition:border .2s;
}
input:focus,textarea:focus{border-color:var(--coral)}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.3rem;font-weight:600}
.form-group{margin-bottom:.9rem}
.summary-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.summary-row.total{font-size:1.1rem;font-weight:700;color:var(--coral);border-bottom:none;padding-top:.8rem}
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:#1a3a6e;color:#fff;padding:.8rem 1.5rem;border-radius:30px;
  font-size:.9rem;z-index:999;border:1px solid var(--coral);
}
.toast.hidden{display:none}
.success-icon{font-size:4rem;text-align:center;margin:1rem 0}
.info-box{background:rgba(255,92,53,.08);border:1px solid rgba(255,92,53,.25);border-radius:var(--r);padding:1rem;margin:.5rem 0;font-size:.9rem;line-height:1.6}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cal-nav button{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:.2rem .5rem}
.fp-dark{background:var(--deep)!important;border-color:var(--border)!important;color:var(--text)!important}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--coral)!important;border-color:var(--coral)!important}
.flatpickr-day.inRange{background:rgba(255,92,53,.15)!important;border-color:transparent!important}
.flatpickr-day.startRange,.flatpickr-day.endRange{background:var(--coral)!important;border-color:var(--coral)!important}

function t(key, ...args){ const v = I18N[LANG][key]; return typeof v === 'function' ? v(...args) : (v || I18N.es[key] || key); }
function _moneyLocale(){ return LANG==='en'?'en-US':LANG==='pt'?'pt-BR':'es-CL'; }
function _alojMoney(n){ return '$'+Number(n).toLocaleString(_moneyLocale()); }
function _alojPickLang(raw){
  if(!raw) return { name:'', desc:'', gname:'' };
  if(LANG==='en'){
    return {
      name: ((raw.name_en||'')+'').trim() || raw.name || '',
      desc: ((raw.description_en||'')+'').trim() || raw.description || '',
      gname: ((raw.group_name_en||'')+'').trim() || raw.group_name || '',
    };
  }
  if(LANG==='pt'){
    return {
      name: ((raw.name_pt||'')+'').trim() || raw.name || '',
      desc: ((raw.description_pt||'')+'').trim() || raw.description || '',
      gname: ((raw.group_name_pt||'')+'').trim() || raw.group_name || '',
    };
  }
  return { name: raw.name||'', desc: raw.description||'', gname: raw.group_name||'' };
}
function rebuildAlojamientosFromDyn(){
  if(!DYN_ALOJAMIENTOS.length) return;
  ALOJAMIENTOS.length = 0;
  DYN_ALOJAMIENTOS.forEach(a=>{
    const loc = _alojPickLang(a);
    const cap = a.capacity||2;
    ALOJAMIENTOS.push({
      id: a.slug,

      name: loc.name,

function toggleMedia(btnId, containerId, src, isImg){
  const btn = document.getElementById(btnId);
  const box = document.getElementById(containerId);
  if(box.children.length){
    box.innerHTML = '';
    btn.textContent = isImg ? '📸 Ver foto' : '📄 Ver PDF / documento';
    return;
  }
  if(isImg){
    const img = document.createElement('img');
    img.src = src; img.className = 'media-img'; img.loading = 'lazy';
    img.alt = 'Imagen'; box.appendChild(img);
  } else {
    const a = document.createElement('a');
    a.href = src; a.target = '_blank'; a.className = 'media-pdf';
    a.innerHTML = '📄 Abrir PDF completo →'; box.appendChild(a);
  }
  btn.textContent = isImg ? '🙈 Ocultar foto' : '🙈 Ocultar';
}

// Visitor session: one UUID per browser tab, stored in sessionStorage
const _sessionId = (()=>{
  try{
    let id = sessionStorage.getItem('hb_sid');
    if(!id){ id = crypto.randomUUID(); sessionStorage.setItem('hb_sid', id); }
    return id;
  }catch(e){ return 'anon-'+Math.random().toString(36).slice(2); }
})();
const _isReturning = (()=>{
  try{ const v=!!localStorage.getItem('hb_visited'); localStorage.setItem('hb_visited','1'); return v; }
  catch(e){ return false; }
})();

const _urlParams = new URLSearchParams(window.location.search);
/** Reads query key case-insensitively; trims and caps length. */
function _queryParam(names, maxLen){
  const cap = typeof maxLen==='number'?maxLen:500;
  for(const n of names){
    let v=( _urlParams.get(n)||'' ).trim();
    if(!v){
      const nl=n.toLowerCase();
      for(const [k,val] of _urlParams.entries()){
        if(k.toLowerCase()===nl){ v=(val||'').trim(); break; }
      }
    }
    if(v) return v.substring(0,cap);
  }
  return '';
}
const _landingAttribution = Object.freeze({
  utm_source:   _queryParam(['utm_source'],100),
  utm_medium:   _queryParam(['utm_medium'],100),
  utm_campaign: _queryParam(['utm_campaign'],200),
  utm_content:  _queryParam(['utm_content'],200),
  parametro_url: _queryParam(['parametro_url','PARAMETRO_URL','parametro'],240),
  fbclid:       _queryParam(['fbclid'],120),
});

function _trackEvent(event, date){
  try{
    const payload = JSON.stringify({
      event, date: date||null,
      lang: (typeof S!=='undefined'&&S.lang)||'es',
      referrer: document.referrer?document.referrer.substring(0,200):'',
      session_id: _sessionId,
      is_returning: _isReturning,
      ..._landingAttribution,
    });
    fetch('/api/booking/track',{method:'POST',headers:{'Content-Type':'application/json'},body:payload}).catch(()=>{});
  }catch(e){}
}

function stepsHtml(active){
  const steps = ['fecha','personas','datos','pago'];
  const labels = t('steps');
  let h = '<div class="steps">';
  steps.forEach((s,i)=>{
    const idx = steps.indexOf(active);
    const cls = i < idx ? 'done' : i===idx ? 'active' : '';
    h += `<div class="step-dot ${cls}">${i < idx ? '✓' : i+1}</div>`;
    if(i < steps.length-1){
      h += `<div class="step-line ${i < idx ? 'done' : ''}"></div>`;
    }
  });
  h += '</div>';
  return h;
}

async function _submitAddonExpOnly(){
  const st=_addonExpState;
  if(!st?.checkIn||!st.checkOut){ showToast(t('addonNeedDates')); return; }
  const name=(document.getElementById('ax-name')?.value||'').trim();
  const phone=(document.getElementById('ax-phone')?.value||'').trim();
  if(!name){ showToast(t('alojEnterName')); return; }
  if(!phone){ showToast(t('alojEnterPhone')); return; }
  const people=Math.max(1, parseInt(document.getElementById('addon-exp-people')?.value||'1',10)||1);
  const btn=document.getElementById('ax-pay-btn');
  if(btn){ btn.disabled=true; btn.textContent=t('alojProcessing'); }
  const endDate=st.checkOut===st.checkIn?null:st.checkOut;
  const payload={
    experience_slug:st.slug,
    experience_name:st.name,
    start_date:st.checkIn,
    end_date:endDate,
    num_people:people,
    price_per_person:st.pricePerPerson,
    customer_name:name,
    customer_phone:phone,
    customer_email:(document.getElementById('ax-email')?.value||'').trim()||null,
    notes:(document.getElementById('ax-notes')?.value||'').trim()||null,
  };
  try{
    const r=await fetch('/api/booking/experience-create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Error');
    if(d.payment_url){
      window.location.href=d.payment_url;
      return;
    }
    if(d.requires_email){
      const ref=d.booking_ref||'';
      document.getElementById('addon-booking-result').innerHTML=`
        <div class="card" style="text-align:center;padding:1.2rem">
          <div style="font-size:2.8rem;margin-bottom:.8rem">📧</div>

          <button class="btn btn-secondary" style="margin-top:1rem" onclick="showExperiencias()">${t('backToMenu')}</button>
        </div>`;
      return;
    }
    throw new Error(t('alojPayErr'));
  }catch(ex){
    showToast((ex.message||'')||t('alojPayErr'));
    if(btn){ btn.disabled=false; btn.textContent=t('addonPayShortExp'); }
  }
}

// ── Image gallery state & navigation ────────────────────────────────────────
const _galState = {};   // gid → current index

function _galBuild(gid, imgs, icon){
  if(!imgs.length)
    return `<div style="text-align:center;font-size:4rem;padding:1.5rem 0;margin-bottom:.5rem">${icon}</div>`;
  if(imgs.length === 1)
    return `<img src="${imgs[0]}" style="width:100%;height:auto;border-radius:10px;margin-bottom:.8rem;display:block"
        onerror="this.outerHTML='<div style=\\'text-align:center;font-size:4rem;padding:1.5rem 0;margin-bottom:.5rem\\'>${icon}</div>'">`;

  _galState[gid] = 0;
  const dots = imgs.map((_,i)=>
    `<span id="${gid}-dot-${i}" style="display:inline-block;width:8px;height:8px;border-radius:50%;
      background:${i===0?'#fff':'rgba(255,255,255,.4)'};transition:background .2s;cursor:pointer"
      onclick="_galGoto('${gid}',${i})"></span>`
  ).join('');

  return `
  <div id="${gid}" style="position:relative;margin-bottom:.8rem;border-radius:10px;overflow:hidden;background:#000;touch-action:pan-y"
       data-imgs='${JSON.stringify(imgs).replace(/'/g,"&#39;")}' data-icon="${icon}">
    <img id="${gid}-img" src="${imgs[0]}" style="width:100%;height:auto;display:block;transition:opacity .2s"
         onerror="this.src='';this.style.display='none'">
    <!-- arrows -->
    <button onclick="_galGoto('${gid}',-1)" style="position:absolute;left:0;top:0;height:100%;width:44px;
      background:linear-gradient(to right,rgba(0,0,0,.45),transparent);color:#fff;border:none;
      font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">‹</button>
    <button onclick="_galGoto('${gid}',1)" style="position:absolute;right:0;top:0;height:100%;width:44px;
      background:linear-gradient(to left,rgba(0,0,0,.45),transparent);color:#fff;border:none;
      font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">›</button>
    <!-- dots -->
    <div style="position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:6px">
      ${dots}
    </div>
    <!-- counter -->
    <div id="${gid}-ctr" style="position:absolute;top:8px;right:10px;background:rgba(0,0,0,.55);color:#fff;
      font-size:11px;border-radius:12px;padding:2px 8px">1 / ${imgs.length}</div>
  </div>`;
}

function _galGoto(gid, dir){
  const wrap = document.getElementById(gid);
  if(!wrap) return;
  const imgs = JSON.parse(wrap.dataset.imgs);
  const total = imgs.length;
  let cur = _galState[gid] || 0;
  cur = (cur + dir + total) % total;
  _galState[gid] = cur;
  const imgEl = document.getElementById(gid+'-img');
  if(imgEl){ imgEl.style.opacity='0'; setTimeout(()=>{ imgEl.src=imgs[cur]; imgEl.style.opacity='1'; },150); }
  const ctr = document.getElementById(gid+'-ctr');
  if(ctr) ctr.textContent = `${cur+1} / ${total}`;
  imgs.forEach((_,i)=>{
    const d = document.getElementById(`${gid}-dot-${i}`);
    if(d) d.style.background = i===cur ? '#fff' : 'rgba(255,255,255,.4)';
  });
}

// Touch/swipe support for galleries
(function(){
  let _tx=0;
  document.addEventListener('touchstart',e=>{
    const g=e.target.closest('[data-imgs]'); if(g) _tx=e.touches[0].clientX;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    const g=e.target.closest('[data-imgs]'); if(!g) return;
    const dx=e.changedTouches[0].clientX - _tx;
    if(Math.abs(dx)>40) _galGoto(g.id, dx<0?1:-1);
  },{passive:true});
})();

/** Match server experience-create / pack-create inclusive day span */
function _addonComputeDays(checkInIso, checkOutIso){
  if(!checkInIso||!checkOutIso) return 0;
  if(checkOutIso < checkInIso) return -1;
  const start = new Date(checkInIso+'T12:00:00');
  const end   = new Date(checkOutIso+'T12:00:00');
  if(checkInIso===checkOutIso) return 1;
  return Math.round((end - start) / 86400000) + 1;
}

function _fpLocaleObj(){
  try{
    const L = flatpickr.l10ns;
    if(!L) return 'es';
    if(LANG==='pt' && L.pt) return L.pt;
    if(LANG==='en' && L.en) return L.en;
    if(L.es) return L.es;
  }catch(_){}
  return 'es';
}

function _initAlojFlatpickr(){
  const {fullyBooked} = _alojState;
  // Only disable dates where ALL units are taken
  const disableFn = date => fullyBooked.has(flatpickr.formatDate(date,'Y-m-d'));
  const fpCfg = {
    minDate:'today', dateFormat:'Y-m-d',
    altInput:true, altFormat:'d/m/Y',
    locale: _fpLocaleObj(), disable:[disableFn],
    disableMobile:true,
  };
  let fpOut;
  const fpIn = flatpickr('#aloj-checkin', {
    ...fpCfg,
    onChange(sel){
      if(!sel.length) return;
      _alojState.checkIn = flatpickr.formatDate(sel[0],'Y-m-d');
      _alojState.checkOut = null;
      document.getElementById('aloj-booking-result').innerHTML='';
      document.getElementById('aloj-nights-label').textContent='';
      const minOut = new Date(sel[0]); minOut.setDate(minOut.getDate()+1);
      fpOut.set('minDate', minOut);
      fpOut.clear();
      setTimeout(()=>fpOut.open(), 120);
    }
  });
  fpOut = flatpickr('#aloj-checkout', {
    ...fpCfg,
    minDate: new Date(Date.now()+86400000),
    onChange(sel){
      if(!sel.length||!_alojState.checkIn) return;
      _alojState.checkOut = flatpickr.formatDate(sel[0],'Y-m-d');
      const nights = Math.round((sel[0]-new Date(_alojState.checkIn))/86400000);
      _alojState.nights = nights;
      document.getElementById('aloj-nights-label').textContent = t('alojNightsLabel', nights);
      _onAlojDatesSelected();
    }
  });
}

function _isRangeBlocked(checkIn, checkOut, blockedRanges){
  for(const r of blockedRanges){
    if(checkIn < r.end && checkOut > r.start) return true;
  }
  return false;
}

function _onAlojDatesSelected(){
  const {checkIn,checkOut,nights,pricePerNight,a,blocked} = _alojState;
  if(!checkIn||!checkOut||nights<1) return;
  if(_isRangeBlocked(checkIn, checkOut, blocked)){
    _renderAlojSolicitud();
  } else {
    _renderAlojAvailable();
  }
}

async function _submitAlojBooking(){
  const name  = (document.getElementById('ab-name')?.value||'').trim();
  const phone = (document.getElementById('ab-phone')?.value||'').trim();
  if(!name)  return showToast(t('alojEnterName'));
  if(!phone) return showToast(t('alojEnterPhone'));
  const btn = document.getElementById('ab-pay-btn');
  if(btn){btn.disabled=true;btn.textContent=t('alojProcessing');}
  const {alojId,a,checkIn,checkOut,pricePerNight}=_alojState;
  const payload={
    accommodation_id:   alojId,
    accommodation_name: a.name,
    accommodation_slug: a.id,
    check_in:  checkIn,
    check_out: checkOut,
    num_people: a.cap,
    price_per_night: pricePerNight,
    customer_name:  name,
    customer_phone: phone,
    customer_email: document.getElementById('ab-email')?.value||null,
  };
  try{
    const r = await fetch('/api/booking/accommodation-create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const j = await r.json();
    if(!r.ok) throw new Error(j.detail || t('alojPayErr'));
    if(j.payment_url){
      window.location.href=j.payment_url;
      return;
    }
    if(j.requires_email){
      const ref=j.booking_ref||'';
      const box=document.getElementById('aloj-booking-result');
      if(box){
        box.innerHTML=`
        <div class="card" style="text-align:center;padding:1.2rem;margin-top:.75rem">
          <div style="font-size:2.8rem;margin-bottom:.8rem">📧</div>
          <div class="card-title">${t('addonHighSeasonTitle')}</div>
          <p style="color:var(--muted);margin-top:.6rem">
            ${t('addonHighSeasonBody')} <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="showAlojamientos()">${t('alojMoreOptions')}</button>
        </div>`;
      }
      if(btn){btn.disabled=false;btn.textContent=t('alojPayLodging');}
      return;
    }
    showToast(t('alojPayErr'));
    if(btn){btn.disabled=false;btn.textContent=t('alojPayLodgingShort');}

    showToast(t('alojConnErr'));

  }

function _armaTotal(personas){
  const sel = Object.entries(S.armaActividades||{}).filter(([,v])=>v).map(([k])=>k);
  let total = 0;
  sel.forEach(id=>{
    const act = ACTIVIDADES.find(a=>a.id===id);
    if(!act) return;
    total += act.flat ? act.pricePP : act.pricePP * personas;
  });
  if(S.armaAlojamiento){
    const alj = ALOJAMIENTOS.find(a=>a.id===S.armaAlojamiento);
    if(alj){
      // parse "$XX.XXX/noche" → number
      const raw = alj.price.replace(/\./g,'').replace(/[^0-9]/g,'');
      total += parseInt(raw,10)||0;
    }
  }
  return total;
}

async function pagarArmaPack(mitad, total){

  const btn = mc.querySelector('.btn');
  if(btn){ btn.textContent='Procesando...'; btn.disabled=true; }

    const r = await fetch('/api/booking/arma-pack-pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},

        customer_name: name,
        customer_phone: phone,

function renderCal(){
  const yr=S.calYear, mo=S.calMonth;
  const firstDayJs = new Date(yr, mo, 1).getDay();
  const leadDays = calLeadDaysMonFirst(firstDayJs);
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = '';
  getDays().forEach(d=>{ cells += `<div class="cal-hdr">${d}</div>`; });
  for(let i=0;i<leadDays;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt = new Date(yr,mo,d);
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = dt < today;
    const isAvail = !isPast && S.availability[key] && S.availability[key].length > 0;
    const isSel = S.selectedDate === key;
    let cls = isPast ? 'past' : isAvail ? (isSel ? 'avail selected':'avail') : 'past';
    const click = isAvail ? `onclick="selectDate('${key}')"` : '';
    cells += `<div class="cal-day ${cls}" ${click}>${d}</div>`;
  }

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">${t('calTitle')}</div>
    <div class="cal-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <strong>${getMonths()[mo]} ${yr}</strong>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <p style="margin-top:.8rem;font-size:.8rem;color:var(--muted)">
      🟡 ${LANG==='es'?'Días disponibles':'Available days'} &nbsp; ${LANG==='es'?'Toca para seleccionar':LANG==='pt'?'Toque para selecionar':'Tap to select'}
    </p>
  </div>
  <button class="btn btn-secondary" onclick="renderMenu()">${t('back')}</button>`;
}

function prevMonth(){
  if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;
  renderCal();
}
function nextMonth(){
  if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;
  renderCal();
}

function selectDate(key){
  S.selectedDate = key;
  S.selectedTime = null;
  _trackEvent('date_selected', key);
  // Fetch dynamic price in background (non-blocking)
  fetch(`/api/booking/dynamic-price?date=${key}&persons=${S.numPeople}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(d){ S.dpMultiplier=d.multiplier||1.0; S.dpEnabled=d.dp_enabled||false; S.dpFactors=d.active_factors||[]; }
    }).catch(()=>{});
  renderTimeSelect();
}

function renderTimeSelect(){
  const avail = S.availability[S.selectedDate] || [];
  const fake  = S.fakeBooked[S.selectedDate] || [];

  // Merge and sort all slots by time; never mark a slot grey if it's already available
  const toMin = s => { const [h,m]=s.split(':').map(Number); return h*60+m; };
  const availSet = new Set(avail);
  const fakeSet = new Set(fake.filter(s => !availSet.has(s)));
  const allTimes = [...new Set([...avail, ...fakeSet])].sort((a,b)=>toMin(a)-toMin(b));

  const btns = allTimes.map(s => {
    if(fakeSet.has(s)){
      return `<button class="time-btn" disabled style="opacity:.45;cursor:not-allowed;filter:grayscale(1);background:var(--border);color:var(--muted);border-color:var(--border)">${s} 🔒</button>`;
    }
    return `<button class="time-btn ${S.selectedTime===s?'selected':''}" onclick="selectTime('${s}')">${s}</button>`;
  }).join('');

  const [yr,mo,dy] = S.selectedDate.split('-');
  const d = new Date(yr,mo-1,dy);
  const dayStr = getDays()[(d.getDay()+6)%7]+' '+dy+'/'+mo+'/'+yr;

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">${t('timeTitle')}</div>
    <p style="color:var(--muted);margin-bottom:.8rem">📅 ${dayStr}</p>
    <div class="time-grid">${btns}</div>
    
  </div>
  <button class="btn btn-secondary" onclick="renderCal()">← ${t('back')}</button>`;
}

function addExtra(id){
  S.extras[id] = (S.extras[id] || 0) + 1;
  renderExtras();
}
function removeExtra(id){
  if((S.extras[id] || 0) <= 1) delete S.extras[id];
  else S.extras[id]--;
  renderExtras();
}
function toggleFlex(){
  S.hasFlex = !S.hasFlex;

async function applyCoupon(){
  const code = (document.getElementById('coupon-input')?.value||'').trim().toUpperCase();
  const msg = document.getElementById('coupon-msg');
  const btn = document.getElementById('coupon-btn');
  if(!code){ if(msg) msg.textContent=''; return; }

  // Reset if same code re-applied
  S.couponCode = ''; S.couponDiscount = 0; S.couponExtra = ''; S.couponPercent = 0;
  if(btn){ btn.disabled=true; btn.textContent='...'; }

  const pp = S.prices[S.numPeople] || 69990;
  const sub = pp * S.numPeople;   // base boat price only — coupon applies to this
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  // Discount base: only the boat reservation (sub), NOT extras
  const discountBase = sub;

  try{
    const r = await fetch(`/api/booking/coupon/${encodeURIComponent(code)}?booking_date=${S.selectedDate||''}`);
    const d = await r.json();
    if(!r.ok){ if(msg){ msg.style.color='#f87171'; msg.textContent=d.detail||'Cupón no válido'; } }
    else{
      S.couponCode = d.code;
      S.couponExtra = d.extra_description || '';

      // Per-people-count rule overrides global discount if a matching rule exists
      let discPct = d.discount_percent || 0;
      let discFixed = d.discount_fixed || 0;
      if(d.rules && d.rules.length > 0){
        const rule = d.rules.find(r => Number(r.num_people) === S.numPeople);
        if(rule){
          discPct = rule.discount_percent || 0;
          discFixed = rule.discount_fixed || 0;
        }
      }

      S.couponPercent = discPct;
      S.couponDiscount = discFixed > 0
        ? Math.min(discFixed, discountBase)
        : Math.round(discountBase * (discPct / 100));
      if(msg){
        msg.style.color='#4ade80';
        const parts = [];
        if(S.couponDiscount > 0) parts.push(`−$${S.couponDiscount.toLocaleString('es-CL')}`);
        if(discPct > 0) parts.push(`${discPct}% descuento`);
        if(S.couponExtra) parts.push(S.couponExtra);
        msg.textContent = `✅ Cupón aplicado${parts.length?' · '+parts.join(' · '):''}`;}
      // Re-render summary to update totals
      const fn = window._lastSummaryFn;
      if(fn) fn(); else renderSolicitudDatos();
    }
  }catch(e){ if(msg){ msg.style.color='#f87171'; msg.textContent='Error al validar cupón'; } }
  finally{ if(btn){ btn.disabled=false; btn.textContent=LANG==='en'?'Apply':LANG==='pt'?'Aplicar':'Aplicar'; } }
}

async function submitBooking(){
  S.customerName = $('f-name').value.trim();
  S.customerPhone = $('f-phone').value.trim();
  S.customerEmail = $('f-email').value.trim();
  S.customerBirthday = ($('f-birthday')?.value||'').trim()||null;
  if(!S.customerName || !S.customerPhone){
    showToast('Por favor ingresa nombre y telefono');
    return;
  }
  const basepp = S.prices[S.numPeople] || 69990;
  const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
  const pp = Math.round(basepp * mult / 1000) * 1000;
  const sub = pp * S.numPeople;
  const extrasArr = EXTRAS_CATALOG.filter(e=>(S.extras[e.id]||0)>0).map(e=>({name:e.name,price:e.price,quantity:S.extras[e.id]}));
  const extTotal = extrasArr.reduce((a,e)=>a+e.price*e.quantity,0);
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  const total = sub + extTotal + flex - (S.couponDiscount||0);

  mc.innerHTML = `<div class="card" style="text-align:center">
    <div style="font-size:2rem;margin:1rem">⏳</div>
    <p>Creando tu reserva...</p>
  </div>`;

  try{
    // Support ?test_price=100 in URL for payment testing
    const testPrice = new URLSearchParams(location.search).get('test_price');
    const payload = {
      customer_name: S.customerName,
      customer_phone: S.customerPhone,
      customer_email: S.customerEmail || null,
      customer_birthday: S.customerBirthday || null,
      customer_language: LANG || 'es',
      booking_date: S.selectedDate,
      booking_time: S.selectedTime,
      num_people: S.numPeople,
      extras: extrasArr,
      has_flex: S.hasFlex,
      coupon_code: S.couponCode || null,
      coupon_discount: S.couponDiscount || 0,
    };
    if(testPrice) payload.test_price = parseInt(testPrice);
    // If coming from accommodation flow, create HotBoat booking without payment order
    if(_pendingAlojBooking || _pendingExpBooking || _pendingPackBooking) payload.skip_payment = true;

    const r = await fetch('/api/booking/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.detail || 'Error');
    S.bookingRef = data.booking_ref;
    S.paymentUrl = data.payment_url;
    S.totalPrice = total;

    if(_pendingAlojBooking){
      // Create combined WooCommerce order: accommodation + HotBoat in one payment
      const alojPayload = { ..._pendingAlojBooking, hotboat_booking_ref: data.booking_ref };
      const alojNights = (new Date(alojPayload.check_out) - new Date(alojPayload.check_in)) / 86400000;
      _pendingAlojBooking = null;
      const ar = await fetch('/api/booking/accommodation-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(alojPayload)
      });
      const adata = await ar.json();
      if(!ar.ok) throw new Error(adata.detail || 'Error al crear reserva alojamiento');
      S.bookingRef = adata.booking_ref;
      S.paymentUrl = adata.payment_url;
      if(!adata.payment_url && adata.requires_email){
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">${t('addonHighSeasonTitle')}</div>
          <p style="color:var(--muted);margin-top:.6rem">
            ${t('addonHighSeasonBody')} <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${adata.booking_ref}</strong></p>
          <p style="color:var(--muted);margin-top:.5rem;font-size:.82rem">HotBoat: <strong>${data.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">${t('backToMenu')}</button>
        </div>`;
        return;
      }
      // Combined totals: HotBoat + accommodation
      const alojTotal = alojPayload.price_per_night * alojNights;
      const alojDeposit = Math.round(alojTotal * 0.5);
      S.totalPrice = total + alojTotal;           // real combined total
      S.depositAmount = Math.round(total * 0.5) + alojDeposit;  // real combined deposit
    } else if(_pendingExpBooking){
      // Create combined WooCommerce order: experience + HotBoat
      const expPayload = { ..._pendingExpBooking, hotboat_booking_ref: data.booking_ref };
      expPayload.num_people = S.numPeople;
      const start = new Date(expPayload.start_date);
      const end   = expPayload.end_date ? new Date(expPayload.end_date) : null;
      const daysCount = (!end || expPayload.end_date === expPayload.start_date)
        ? 1
        : Math.round((end - start) / 86400000) + 1;
      const expTotal = expPayload.price_per_person * expPayload.num_people * daysCount;
      const expDeposit = Math.round(expTotal * 0.5);

      _pendingExpBooking = null;

      const er = await fetch('/api/booking/experience-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(expPayload)
      });
      const edata = await er.json();
      if(!er.ok) throw new Error(edata.detail || 'Error al crear reserva experiencia');

      S.bookingRef = edata.booking_ref;
      S.paymentUrl = edata.payment_url;
      S.totalPrice = total + expTotal;
      S.depositAmount = Math.round(total * 0.5) + expDeposit;

      if(!edata.payment_url && edata.requires_email){
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">Alta temporada — Coordinamos por email</div>
          <p style="color:var(--muted);margin-top:.6rem">
            Para confirmar la experiencia, escribe a <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${edata.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">Volver al inicio</button>
        </div>`;
        return;
      }
    } else if(_pendingPackBooking){
      // Create combined WooCommerce order: pack + HotBoat
      const packPayload = { ..._pendingPackBooking, hotboat_booking_ref: data.booking_ref };
      packPayload.num_people = S.numPeople;
      const start = new Date(packPayload.start_date);
      const end   = packPayload.end_date ? new Date(packPayload.end_date) : null;
      const daysCount = (!end || packPayload.end_date === packPayload.start_date)
        ? 1
        : Math.round((end - start) / 86400000) + 1;
      const packTotal = packPayload.unit_price_per_person * packPayload.num_people * daysCount;
      const packDeposit = Math.round(packTotal * 0.5);

      _pendingPackBooking = null;

      const pr = await fetch('/api/booking/pack-create',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(packPayload)
      });
      const pdata = await pr.json();
      if(!pr.ok) throw new Error(pdata.detail || 'Error al crear reserva pack');

      S.bookingRef = pdata.booking_ref;
      S.paymentUrl = pdata.payment_url;
      S.totalPrice = total + packTotal;
      S.depositAmount = Math.round(total * 0.5) + packDeposit;

      if(!pdata.payment_url && pdata.requires_email){
        mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:3rem;margin-bottom:1rem">📧</div>
          <div class="card-title">Alta temporada — Coordinamos por email</div>
          <p style="color:var(--muted);margin-top:.6rem">
            Para confirmar el pack, escribe a <strong>info@hotboatchile.com</strong>.
          </p>
          <p style="color:var(--muted);margin-top:.4rem;font-size:.85rem">Ref: <strong>${pdata.booking_ref}</strong></p>
          <button class="btn btn-secondary" style="margin-top:1rem" onclick="renderMenu()">Volver al inicio</button>
        </div>`;
        return;
      }
    }

    _trackEvent('booking_completed', S.selectedDate);
    renderPayment();
  }catch(e){
    _pendingAlojBooking = null;
    _pendingExpBooking = null;
    _pendingPackBooking = null;
    mc.innerHTML = `<div class="card"><p style="color:red">Error: ${e.message}</p></div>`;
  }
}

function renderPayment(){
  const [yr,mo,dy] = S.selectedDate.split('-');
  const isCombined = S.bookingRef && S.bookingRef.startsWith('HA-');
  const deposit = S.depositAmount || Math.round(S.totalPrice * 0.5);
  S.depositAmount = 0; // reset after use
  const resto   = S.totalPrice - deposit;
  const subline = isCombined
    ? `Alojamiento + HotBoat · ${S.numPeople}p · ${dy}/${mo}/${yr} ${S.selectedTime}`
    : `${S.numPeople} persona${S.numPeople>1?'s':''} · ${dy}/${mo}/${yr} ${S.selectedTime}`;
  mc.innerHTML = `
  ${stepsHtml('pago')}
  <div class="card" style="text-align:center">
    <div style="font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:.3rem">💳 Pagar Reserva</div>
    <p style="color:var(--muted);margin-bottom:.8rem;font-size:.85rem">Ref: <strong>${S.bookingRef}</strong></p>

    <div style="background:var(--bg);border-radius:12px;padding:1rem;margin:.75rem 0">
      <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem">Depósito ahora (50%)</div>
      <div style="font-size:2rem;font-weight:800;color:var(--gold)">$${deposit.toLocaleString('es-CL')}</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">${subline}</div>
    </div>

    <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:.75rem 1rem;margin:.5rem 0;display:flex;justify-content:space-between;align-items:center;font-size:.85rem">
      <span style="color:var(--muted)">Total experiencia</span>
      <span style="font-weight:700">$${S.totalPrice.toLocaleString('es-CL')}</span>
    </div>
    <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:.75rem 1rem;margin:.5rem 0;display:flex;justify-content:space-between;align-items:center;font-size:.85rem">
      <span style="color:var(--muted)">Saldo al llegar</span>
      <span style="font-weight:700">$${resto.toLocaleString('es-CL')}</span>
    </div>

    <div style="background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:10px;padding:.7rem 1rem;margin:.75rem 0;font-size:.8rem;color:var(--muted);text-align:left">
      ${isCombined
        ? '🏠🚤 El saldo restante se paga <strong>al terminar el paseo en HotBoat</strong>, en efectivo o transferencia.'
        : '🚤 El saldo restante se paga <strong>al terminar el paseo en HotBoat</strong>, en efectivo o transferencia.'}
    </div>

    ${S.paymentUrl ? `
      <a href="${S.paymentUrl}" class="btn" style="text-decoration:none;margin-top:.5rem;font-size:1rem;padding:.9rem">
        Pagar $${deposit.toLocaleString('es-CL')} 💳
      </a>
      <p style="color:var(--muted);font-size:.78rem;margin-top:.7rem">
        Pago seguro · Débito, crédito, Webpay y más
      </p>` : `
      <div class="info-box">
        ✅ Reserva creada. Nos contactaremos a tu WhatsApp para coordinar el pago.
      </div>`}
  </div>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderMenu()">Volver al inicio</button>`;
}

function checkReturnFromPayment(){
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('booking_ref');
  const status = params.get('collection_status') || params.get('payment_status');
  if(ref && status==='approved'){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">🎉</div>
      <div class="card-title">Reserva Confirmada!</div>
      <p style="color:var(--muted);margin:.5rem 0">Ref: <strong>${ref}</strong></p>
      <div class="info-box" style="margin-top:1rem">
        Te enviaremos los detalles por WhatsApp. Nos vemos en el lago! 🚤🔥
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">Nueva reserva</button>`;
    return true;
  }
  if(ref && (status==='failure'||status==='rejected')){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">❌</div>
      <div class="card-title">${t('failTitle')}</div>
      <div class="info-box" style="margin-top:1rem">
        ${t('failMsg', ref)}
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">${t('returnMenu')}</button>`;
    return true;
  }
  return false;
}

async function init(){
  if(!checkReturnFromPayment()){
    renderLangSwitcher();
    mc.innerHTML = `<div class="card" style="text-align:center"><p>${t('loading')}</p></div>`;
    await Promise.all([loadPricesAndAvail(), loadDynamicContent()]);
    renderMenu();

    // Track page exit via sendBeacon (survives page unload)
    window.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='hidden'){
        const d = JSON.stringify({
          event:'exit',
          session_id:_sessionId,
          is_returning:_isReturning,
          lang:S.lang||'es',
          referrer: document.referrer?document.referrer.substring(0,200):'',
          ..._landingAttribution,
        });
        navigator.sendBeacon('/api/booking/track', new Blob([d],{type:'application/json'}));
      }
    });

    // Show test mode banner
    const tp = new URLSearchParams(location.search).get('test_price');
    if(tp){
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f0a500;color:#0a1628;'+
        'text-align:center;padding:.4rem;font-weight:700;font-size:.85rem;z-index:9999;';
      banner.textContent = `🧪 MODO TEST — el pago se procesará por $${parseInt(tp).toLocaleString('es-CL')} CLP`;
      document.body.prepend(banner);
    }
  }
}

init();
</script>
</body>
</html>
