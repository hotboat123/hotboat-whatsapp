<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style id="booking-css">
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--deep:#0d2040;--blue:#1a3a6e;
  --coral:#ff5c35;--gold:#f0a500;
  --text:#f0f4ff;--muted:#8899bb;
  --card:#132240;--border:#1e3a6e;
  --r:14px;
}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
#hdr{
  background:linear-gradient(135deg,var(--deep) 0%,var(--blue) 100%);
  text-align:center;padding:1.2rem 1rem 1rem;
  border-bottom:2px solid var(--coral);
}
.logo-img{max-height:120px;max-width:420px;width:auto;object-fit:contain;display:block;margin:0 auto;filter:brightness(0) invert(1)}
/* Fallback text shown only when logo image is missing */
.logo-wrap{display:none;align-items:center;justify-content:center;gap:.5rem}
.fire{font-size:2.5rem}
.brand{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--text);letter-spacing:.1em}
.sub{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--coral)}
.tagline{margin-top:.4rem;color:var(--muted);font-size:.85rem;font-weight:300}
#main-content{max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.2rem}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--coral);letter-spacing:.05em;margin-bottom:1rem}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:400px){.menu-grid{grid-template-columns:1fr}}
.menu-btn{
  background:var(--deep);border:1px solid var(--border);color:var(--text);
  border-radius:var(--r);padding:1rem;cursor:pointer;text-align:left;
  display:flex;flex-direction:column;gap:.3rem;transition:all .2s;
}
.menu-btn:hover,.menu-btn.active{border-color:var(--coral);background:rgba(255,92,53,.1)}
.menu-btn .icon{font-size:1.5rem}
.menu-btn .label{font-weight:600;font-size:.9rem}
.menu-btn .desc{font-size:.75rem;color:var(--muted)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  background:var(--coral);color:#fff;border:none;border-radius:var(--r);
  padding:.85rem 1.8rem;font-size:1rem;font-weight:700;cursor:pointer;
  width:100%;transition:background .2s;
}
.btn:hover{background:#e04520}
.btn-secondary{background:var(--deep);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--blue)}
.steps{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-bottom:1.5rem}
.step-dot{
  width:32px;height:32px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;
  color:var(--muted);transition:all .3s;
}
.step-dot.done{background:var(--coral);border-color:var(--coral);color:#fff}
.step-dot.active{border-color:var(--coral);color:var(--coral)}
.step-line{flex:1;height:2px;background:var(--border);max-width:50px}
.step-line.done{background:var(--coral)}
.media-toggle{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:.45rem .9rem;font-size:.8rem;cursor:pointer;width:100%;margin:.5rem 0;transition:border-color .2s}
.media-toggle:hover{border-color:var(--gold);color:var(--gold)}
.media-img{width:100%;border-radius:12px;margin-top:.5rem;display:block;height:auto}
.media-pdf{display:flex;align-items:center;gap:.5rem;background:var(--deep);border:1.5px solid var(--border);border-radius:8px;padding:.55rem .9rem;font-size:.8rem;color:var(--muted);text-decoration:none;margin:.4rem 0;transition:border-color .2s}
.media-pdf:hover{border-color:var(--gold);color:var(--gold)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.5rem}
.cal-hdr{text-align:center;font-size:.7rem;font-weight:600;color:var(--muted);padding:.3rem 0}
.cal-day{
  text-align:center;padding:.5rem .2rem;border-radius:8px;cursor:pointer;font-size:.85rem;
  border:1px solid transparent;transition:all .2s;
}
.cal-day.avail{background:rgba(240,165,0,.1);border-color:var(--gold);color:var(--gold)}
.cal-day.avail:hover,.cal-day.selected{background:var(--gold);color:#000;font-weight:700}
.cal-day.past,.cal-day.empty{color:var(--border);cursor:default;pointer-events:none}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.5rem}
.time-btn{
  background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:.65rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.time-btn:hover,.time-btn.selected{background:var(--coral);border-color:var(--coral);color:#fff}
.counter{display:flex;align-items:center;gap:1rem;justify-content:center;margin:.5rem 0}
.counter-btn{
  width:40px;height:40px;border-radius:50%;background:var(--deep);border:1.5px solid var(--border);
  color:var(--text);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.counter-btn:hover{border-color:var(--coral);color:var(--coral)}
.counter-val{font-size:2rem;font-weight:700;min-width:50px;text-align:center}
.price-tag{
  background:rgba(255,92,53,.1);border:1px solid rgba(255,92,53,.3);
  border-radius:var(--r);padding:.75rem 1rem;text-align:center;margin:.5rem 0;
}
.price-big{font-size:1.5rem;font-weight:700;color:var(--coral)}
.price-sub{font-size:.8rem;color:var(--muted)}
.extra-list{display:flex;flex-direction:column;gap:.6rem;margin:.5rem 0}
.extra-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--deep);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;cursor:pointer;
  transition:all .2s;
}
.extra-item.selected{border-color:var(--coral);background:rgba(255,92,53,.1)}
.extra-name{font-size:.9rem;font-weight:600}
.extra-price{font-size:.8rem;color:var(--gold);font-weight:700}
input[type=text],input[type=email],input[type=tel],textarea{
  width:100%;background:var(--deep);border:1.5px solid var(--border);color:var(--text);
  border-radius:10px;padding:.7rem 1rem;font-size:.95rem;font-family:inherit;
  outline:none;transition:border .2s;
}
input:focus,textarea:focus{border-color:var(--coral)}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.3rem;font-weight:600}
.form-group{margin-bottom:.9rem}
.summary-row{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.summary-row.total{font-size:1.1rem;font-weight:700;color:var(--coral);border-bottom:none;padding-top:.8rem}
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:#1a3a6e;color:#fff;padding:.8rem 1.5rem;border-radius:30px;
  font-size:.9rem;z-index:999;border:1px solid var(--coral);
}
.toast.hidden{display:none}
.success-icon{font-size:4rem;text-align:center;margin:1rem 0}
.info-box{background:rgba(255,92,53,.08);border:1px solid rgba(255,92,53,.25);border-radius:var(--r);padding:1rem;margin:.5rem 0;font-size:.9rem;line-height:1.6}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cal-nav button{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:.2rem .5rem}
</style>
</head>

function showToast(msg, ms=3000){
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), ms);
}

function toggleMedia(btnId, containerId, src, isImg){
  const btn = document.getElementById(btnId);
  const box = document.getElementById(containerId);
  if(box.children.length){
    box.innerHTML = '';
    btn.textContent = isImg ? '📸 Ver foto' : '📄 Ver PDF / documento';
    return;
  }
  if(isImg){
    const img = document.createElement('img');
    img.src = src; img.className = 'media-img'; img.loading = 'lazy';
    img.alt = 'Imagen'; box.appendChild(img);
  } else {
    const a = document.createElement('a');
    a.href = src; a.target = '_blank'; a.className = 'media-pdf';
    a.innerHTML = '📄 Abrir PDF completo →'; box.appendChild(a);
  }
  btn.textContent = isImg ? '🙈 Ocultar foto' : '🙈 Ocultar';
}

// Helper to build a media block (img + optional pdf link)
function mediaBlock(id, imgSrc, pdfSrc){
  const imgBtn = imgSrc ? `
    <button id="mb-btn-${id}" class="media-toggle" onclick="toggleMedia('mb-btn-${id}','mb-box-${id}','${imgSrc}',true)">📸 Ver foto</button>
    <div id="mb-box-${id}"></div>` : '';
  const pdfLink = pdfSrc ? `<a href="${pdfSrc}" target="_blank" class="media-pdf">📄 Ver / descargar PDF completo →</a>` : '';
  return imgBtn + pdfLink;
}

async function loadPricesAndAvail(){
  try{
    const [pr, av] = await Promise.all([
      fetch('/api/booking/prices').then(r=>r.json()),
      fetch('/api/booking/availability?days=60').then(r=>r.json()),
    ]);
    S.prices = pr.prices || {};
    S.availability = av.availability || {};
  }catch(e){ showToast('Error cargando disponibilidad'); }
}

function stepsHtml(active){
  const steps = ['fecha','personas','datos','pago'];
  const labels = ['Fecha','Personas','Datos','Pago'];
  let h = '<div class="steps">';
  steps.forEach((s,i)=>{
    const idx = steps.indexOf(active);
    const cls = i < idx ? 'done' : i===idx ? 'active' : '';
    h += `<div class="step-dot ${cls}">${i < idx ? '✓' : i+1}</div>`;
    if(i < steps.length-1){
      h += `<div class="step-line ${i < idx ? 'done' : ''}"></div>`;
    }
  });
  h += '</div>';
  return h;
}

// Dynamic data loaded from API
let DYN_EXPERIENCIAS = [];
let DYN_PACKS = [];

async function loadDynamicContent(){
  try{
    const [er, pr] = await Promise.all([
      fetch('/api/content/experiencias').then(r=>r.json()),
      fetch('/api/content/packs').then(r=>r.json()),
    ]);
    if(er.experiences) DYN_EXPERIENCIAS = er.experiences;
    if(pr.packs) DYN_PACKS = pr.packs;
    // Sync ACTIVIDADES for arma-tu-pack using dynamic experiences (skip alojamiento-type)
    if(DYN_EXPERIENCIAS.length){
      ACTIVIDADES.length = 0;
      // Always keep HotBoat as first
      ACTIVIDADES.push({id:'hotboat',icon:'🚤',name:'HotBoat',desc:'Paseo 2 horas en el lago',pricePP:69990,flat:false});
      DYN_EXPERIENCIAS.forEach(e=>{
        ACTIVIDADES.push({id:e.slug,icon:e.icon,name:e.name,desc:e.description||'',pricePP:e.price_per_person||0,flat:e.slug==='auto'});
      });
    }
    if(DYN_PACKS.length){
      PACKS.length=0;
      DYN_PACKS.forEach(p=>{
        PACKS.push({id:p.slug,icon:p.icon,name:p.name,personas:p.personas,desc:p.description,
          includes:p.includes||[],desde:'Desde $'+Number(p.price_from).toLocaleString('es-CL'),
          image:p.image_path});
      });
    }
  }catch(e){ console.warn('Dynamic content load failed:', e); }
}

function showExperiencias(){

    <button class="menu-btn" onclick="showExperienciaDetail('${e.slug}')" style="flex-direction:row;align-items:center;gap:.75rem">

    <div class="card-title">🏔️ Otras Experiencias</div>
    <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">Aventuras en Pucon y alrededores</p>

}

function showExperienciaDetail(slug){
  const list = DYN_EXPERIENCIAS.length ? DYN_EXPERIENCIAS : [];
  const e = list.find(x=>x.slug===slug);
  if(!e){ showExperiencias(); return; }
  const img = e.image_path ? mediaBlock(slug, e.image_path, '/media/documents/experiencias.pdf') : '';
  mc.innerHTML = `
  <div class="card">
    <div style="text-align:center;font-size:3rem;margin-bottom:.5rem">${e.icon}</div>
    <div class="card-title">${e.name}</div>
    <p style="color:var(--muted);margin-bottom:.8rem">${e.description||''}</p>

    ${img}
  </div>
  <button class="btn" onclick="showExtrasDateForm('${slug}','${e.name}','experience')">Solicitar ${e.name}</button>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="showExperiencias()">Volver</button>`;
}

function _armaTotal(personas){
  const sel = Object.entries(S.armaActividades||{}).filter(([,v])=>v).map(([k])=>k);
  let total = 0;
  sel.forEach(id=>{
    const act = ACTIVIDADES.find(a=>a.id===id);
    if(!act) return;
    total += act.flat ? act.pricePP : act.pricePP * personas;
  });
  if(S.armaAlojamiento){
    const alj = ALOJAMIENTOS.find(a=>a.id===S.armaAlojamiento);
    if(alj){
      // parse "$XX.XXX/noche" → number
      const raw = alj.price.replace(/\./g,'').replace(/[^0-9]/g,'');
      total += parseInt(raw,10)||0;
    }
  }
  return total;
}

async function pagarArmaPack(mitad, total){
  const name  = document.getElementById('ap-name').value.trim();
  const phone = document.getElementById('ap-phone').value.trim();
  const dates = document.getElementById('ap-dates').value.trim();
  if(!name||!phone){ showToast('Ingresa nombre y telefono'); return; }
  const sel = Object.entries(S.armaActividades||{}).filter(([,v])=>v).map(([k])=>k);
  const btn = mc.querySelector('.btn');
  if(btn){ btn.textContent='Procesando...'; btn.disabled=true; }
  try{
    const r = await fetch('/api/booking/arma-pack-pay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        customer_name: name,
        customer_phone: phone,
        activities: sel,
        alojamiento: S.armaAlojamiento||'',
        num_people: S.armaPersonas||2,
        dates_preference: dates,
        notes: document.getElementById('ap-notes').value.trim(),
        total_amount: total,
        deposit_amount: mitad,
      }),
    });
    const d = await r.json();
    if(d.payment_url){
      window.location.href = d.payment_url;
    } else if(d.booking_ref){
      // MP not configured or failed — build WhatsApp deep link with payment details
      const actNames = sel.map(id=>ACTIVIDADES.find(a=>a.id===id)?.name||id).join(', ');
      const personas = S.armaPersonas||2;
      const waMsg = encodeURIComponent(
        `Hola! Quiero reservar mi Pack HotBoat 🚤\n`+
        `Ref: ${d.booking_ref}\n`+
        `Actividades: ${actNames}\n`+
        `Personas: ${personas}\n`+
        `Fechas: ${dates||'a coordinar'}\n`+
        `Total: $${total.toLocaleString('es-CL')} · Depósito 50%: $${mitad.toLocaleString('es-CL')}\n`+
        `Nombre: ${name} · Tel: ${phone}`
      );
      const waUrl = `https://wa.me/56975780920?text=${waMsg}`;
      mc.innerHTML = `<div class="card" style="text-align:center;padding:1.5rem">
        <div style="font-size:2.5rem;margin-bottom:.75rem">✅</div>
        <div class="card-title" style="margin-bottom:.5rem">¡Reserva registrada!</div>
        <p style="color:var(--muted);font-size:.83rem;margin-bottom:.3rem">Ref: <strong>${d.booking_ref}</strong></p>
        <p style="color:var(--muted);font-size:.83rem;margin-bottom:1.2rem">El pago se coordina directamente con el Capitán Tomás por WhatsApp.</p>
        <div style="background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);border-radius:10px;padding:.85rem;margin-bottom:1rem;font-size:.84rem;line-height:1.8">
          <div><strong>Actividades:</strong> ${actNames}</div>
          <div><strong>Personas:</strong> ${personas}</div>
          ${dates?`<div><strong>Fechas:</strong> ${dates}</div>`:''}
          <div style="margin-top:.4rem;color:var(--gold);font-weight:700">Depósito a pagar: $${mitad.toLocaleString('es-CL')}</div>
        </div>
      </div>
      <a href="${waUrl}" target="_blank" rel="noopener" class="btn" style="display:block;text-align:center;text-decoration:none;background:#25D366">
        💬 Coordinar pago por WhatsApp
      </a>
      <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderMenu()">Volver al menu</button>`;
    }
  }catch(e){
    showToast('Error: '+e.message);
    if(btn){ btn.textContent='💳 Pagar reserva'; btn.disabled=false; }
  }
}

async function enviarExtrasForm(slug, name, type){
  const nameVal  = document.getElementById('ef-name').value.trim();
  const phone    = document.getElementById('ef-phone').value.trim();
  const start    = document.getElementById('ef-start').value;
  const end      = document.getElementById('ef-end').value || null;
  const people   = parseInt(document.getElementById('ef-people').value)||1;
  const notes    = document.getElementById('ef-notes').value.trim();
  if(!nameVal||!phone||!start){ showToast('Ingresa nombre, teléfono y fecha inicio'); return; }
  const btn = mc.querySelector('.btn');
  if(btn){ btn.textContent='Enviando...'; btn.disabled=true; }
  try{
    // Create extras booking (public endpoint, no auth needed)
    await fetch('/api/content/extras-booking', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        customer_name: nameVal, customer_phone: phone,
        item_type: type, item_slug: slug, item_name: name,
        start_date: start, end_date: end,
        num_people: people, notes: notes,
        total_price:0, deposit_paid:0, status:'pendiente',
      }),
    });
    // Also create solicitud for admin notification
    await fetch('/api/booking/solicitud',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        customer_name:nameVal, customer_phone:phone,
        service_type: type+':'+slug,
        title: name,
        dates_preference: start+(end?' al '+end:''),
        people: String(people),
        notes,
      }),
    });
    mc.innerHTML = `<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:3rem;margin-bottom:1rem">✅</div>
      <div class="card-title">Solicitud enviada</div>
      <p style="color:var(--muted);margin-top:.5rem">El Capitán Tomás te contactará por WhatsApp para coordinar los detalles.</p>
    </div>
    <button class="btn btn-secondary" onclick="renderMenu()">Volver al menu</button>`;
  }catch(e){
    showToast('Error: '+e.message);
    if(btn){ btn.textContent='Enviar Solicitud 📩'; btn.disabled=false; }
  }
}

    <div class="card-title">📋 ${title}</div>
    <div class="info-box" style="margin-bottom:1rem;font-size:.85rem">
      Completa tus datos y el Capitan Tomas te contactara por WhatsApp 👨‍✈️
    </div>
    ${prefill?`<div class="info-box" style="margin-bottom:.8rem;font-size:.82rem;white-space:pre-line">${prefill}</div>`:''}
    <div class="form-group"><label>Nombre completo *</label>
      <input type="text" id="sq-name" placeholder="Tu nombre"></div>
    <div class="form-group"><label>WhatsApp / Telefono *</label>
      <input type="tel" id="sq-phone" placeholder="+56 9 xxxx xxxx"></div>
    <div class="form-group"><label>Email (opcional)</label>
      <input type="email" id="sq-email" placeholder="tu@email.com"></div>
    <div class="form-group"><label>Fechas preferidas</label>
      <input type="text" id="sq-dates" placeholder="Ej: 15 al 17 de enero 2026"></div>
    <div class="form-group"><label>Cuantas personas</label>
      <input type="text" id="sq-people" placeholder="Ej: 2 adultos, 1 nino"></div>
    <div class="form-group"><label>Mensaje adicional</label>
      <textarea id="sq-notes" rows="3" placeholder="Consultas o preferencias..."></textarea></div>
    <input type="hidden" id="sq-ctx" value="${ctx||''}">
    <input type="hidden" id="sq-title" value="${title||''}">
  </div>
  <button class="btn" onclick="enviarSolicitud()">Enviar Solicitud 📩</button>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderMenu()">Volver al menu</button>`;
}

async function enviarSolicitud(){
  const name = $('sq-name').value.trim();
  const phone = $('sq-phone').value.trim();
  if(!name||!phone){ showToast('Ingresa nombre y telefono'); return; }
  const body = {
    customer_name:name, customer_phone:phone,
    customer_email:$('sq-email').value.trim()||null,
    dates_preference:$('sq-dates').value.trim(),
    people:$('sq-people').value.trim(),
    notes:$('sq-notes').value.trim(),
    service_type:$('sq-ctx').value,
    title:$('sq-title').value,
  };
  try{
    const r = await fetch('/api/booking/solicitud',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail||'Error');
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">✅</div>
      <div class="card-title">Solicitud Enviada!</div>
      <div class="info-box" style="margin-top:1rem">
        El Capitan Tomas revisara tu solicitud y te contactara pronto por WhatsApp al <strong>${phone}</strong> 📱
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">Volver al inicio</button>`;
  }catch(e){ showToast('Error: '+e.message); }
}

function goReservar(){
  S.step = 'fecha';
  renderCal();
}

function renderCal(){
  const yr=S.calYear, mo=S.calMonth;
  const firstDayJs = new Date(yr, mo, 1).getDay();
  const leadDays = calLeadDaysMonFirst(firstDayJs);
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = '';
  DAYS.forEach(d=>{ cells += `<div class="cal-hdr">${d}</div>`; });
  for(let i=0;i<leadDays;i++) cells += `<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dt = new Date(yr,mo,d);
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isPast = dt < today;
    const isAvail = !isPast && S.availability[key] && S.availability[key].length > 0;
    const isSel = S.selectedDate === key;
    let cls = isPast ? 'past' : isAvail ? (isSel ? 'avail selected':'avail') : 'past';
    const click = isAvail ? `onclick="selectDate('${key}')"` : '';
    cells += `<div class="cal-day ${cls}" ${click}>${d}</div>`;
  }

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">📅 Elige tu fecha</div>
    <div class="cal-nav">
      <button onclick="prevMonth()">&#8249;</button>
      <strong>${MONTHS[mo]} ${yr}</strong>
      <button onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <p style="margin-top:.8rem;font-size:.8rem;color:var(--muted)">
      🟡 Dias disponibles &nbsp; Toca para seleccionar
    </p>
  </div>
  <button class="btn btn-secondary" onclick="renderMenu()">Volver</button>`;
}

function prevMonth(){
  if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;
  renderCal();
}
function nextMonth(){
  if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;
  renderCal();
}

function selectDate(key){
  S.selectedDate = key;
  S.selectedTime = null;
  // Fetch dynamic price in background (non-blocking)
  fetch(`/api/booking/dynamic-price?date=${key}&persons=${S.numPeople}`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(d){ S.dpMultiplier=d.multiplier||1.0; S.dpEnabled=d.dp_enabled||false; S.dpFactors=d.active_factors||[]; }
    }).catch(()=>{});
  renderTimeSelect();
}

function renderTimeSelect(){
  const times = S.availability[S.selectedDate] || [];
  const btns = times.map(t=>`
    <button class="time-btn ${S.selectedTime===t?'selected':''}" onclick="selectTime('${t}')">${t}</button>
  `).join('');
  const [yr,mo,dy] = S.selectedDate.split('-');
  const d = new Date(yr,mo-1,dy);
  const dayStr = DAYS[(d.getDay()+6)%7]+' '+dy+'/'+mo+'/'+yr;

  mc.innerHTML = `
  ${stepsHtml('fecha')}
  <div class="card">
    <div class="card-title">🕐 Elige tu horario</div>
    <p style="color:var(--muted);margin-bottom:.8rem">📅 ${dayStr}</p>
    <div class="time-grid">${btns}</div>
  </div>
  <button class="btn btn-secondary" onclick="renderCal()">Cambiar fecha</button>`;
}

function selectTime(t){
  S.selectedTime = t;
  renderPeopleSelect();
}

function renderPeopleSelect(){
  function update(){
    const basepp = S.prices[S.numPeople] || 69990;
    const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
    const pp = Math.round(basepp * mult / 1000) * 1000;
    const total = pp * S.numPeople;
    $('pp-val').textContent = S.numPeople;
    $('pp-price').textContent = `$${pp.toLocaleString('es-CL')}/persona · Total $${total.toLocaleString('es-CL')}`;
    const badge = document.getElementById('dp-badge');
    if(badge){
      if(S.dpEnabled && mult !== 1.0){
        const pct = Math.round((mult-1)*100);
        const sign = pct>0?'+':'';
        const col = pct>0?'#e74c3c':'#2ecc71';
        badge.innerHTML = `<span style="background:${col}22;color:${col};border:1px solid ${col}44;border-radius:20px;padding:.2rem .6rem;font-size:.72rem;font-weight:600">${sign}${pct}% precio dinamico</span>`;
        if(S.dpFactors&&S.dpFactors.length) badge.title = S.dpFactors.join(' · ');
      } else {
        badge.innerHTML = '';
      }
      if(mult<1.0){
        const oldPrice = document.getElementById('pp-price-old');
        if(oldPrice) oldPrice.textContent = `Precio normal: $${basepp.toLocaleString('es-CL')}/pers`;
      }
    }
  }
  mc.innerHTML = `
  ${stepsHtml('personas')}
  <div class="card">
    <div class="card-title">👥 Cuantas personas?</div>
    <p style="color:var(--muted);margin-bottom:1rem">Min 2 · Max 7 personas</p>
    <div class="counter">
      <button class="counter-btn" onclick="changePeople(-1)">−</button>
      <div class="counter-val" id="pp-val">${S.numPeople}</div>
      <button class="counter-btn" onclick="changePeople(1)">+</button>
    </div>
    <div class="price-tag">
      <div class="price-big" id="pp-price"></div>
      <div id="dp-badge" style="margin-top:.3rem"></div>
      <div class="price-sub">Incluye 2 horas en el lago</div>
    </div>
  </div>
  <button class="btn" onclick="goExtras()">Siguiente: Extras →</button>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderTimeSelect()">Volver</button>`;
  update();
}

function changePeople(d){
  S.numPeople = Math.max(2,Math.min(7,S.numPeople+d));
  renderPeopleSelect();
}

function goExtras(){
  S.step = 'extras';
  renderExtras();
}

function renderExtras(){
  const items = EXTRAS_CATALOG.map(e=>`
    <div class="extra-item ${S.extras[e.id]?'selected':''}" onclick="toggleExtra('${e.id}')">
      <div><div class="extra-name">${e.icon} ${e.name}</div></div>
      <div class="extra-price">+$${e.price.toLocaleString('es-CL')}</div>
    </div>`).join('');
  const flexCls = S.hasFlex ? 'selected' : '';
  mc.innerHTML = `
  ${stepsHtml('personas')}
  <div class="card">
    <div class="card-title">🎁 Extras opcionales</div>
    <div class="extra-list">${items}</div>
    <div class="extra-item ${flexCls}" style="margin-top:.5rem" onclick="toggleFlex()">
      <div><div class="extra-name">🔒 Reserva FLEX</div>
        <div style="font-size:.75rem;color:var(--muted)">Cancela hasta 48h antes · +10% del valor</div>
      </div>
      <div class="extra-price">+10%</div>
    </div>
  </div>
  <button class="btn" onclick="renderForm()">Siguiente: Datos →</button>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderPeopleSelect()">Volver</button>`;
}

function toggleExtra(id){
  S.extras[id] = !S.extras[id];
  renderExtras();
}
function toggleFlex(){
  S.hasFlex = !S.hasFlex;
  renderExtras();
}

function renderForm(){
  const basepp = S.prices[S.numPeople] || 69990;
  const mult = (S.dpEnabled && S.dpMultiplier) ? S.dpMultiplier : 1.0;
  const pp = Math.round(basepp * mult / 1000) * 1000;
  const sub = pp * S.numPeople;
  let extTotal = 0;
  const extRows = EXTRAS_CATALOG.filter(e=>S.extras[e.id]).map(e=>{
    extTotal += e.price;
    return `<div class="summary-row"><span>${e.icon} ${e.name}</span><span>$${e.price.toLocaleString('es-CL')}</span></div>`;
  }).join('');
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  const total = sub + extTotal + flex;
  const [yr,mo,dy] = S.selectedDate.split('-');

  mc.innerHTML = `
  ${stepsHtml('datos')}
  <div class="card">
    <div class="card-title">📋 Resumen de reserva</div>
    <div class="summary-row"><span>📅 Fecha</span><span>${dy}/${mo}/${yr} ${S.selectedTime}</span></div>
    <div class="summary-row"><span>👥 Personas</span><span>${S.numPeople}</span></div>
    <div class="summary-row"><span>💰 Tarifa base</span><span>$${sub.toLocaleString('es-CL')}${(()=>{if(S.dpEnabled&&mult!==1.0){const c=mult>1?'#e74c3c':'#2ecc71';const p=Math.round((mult-1)*100);const s=p>0?'+':'';return ` <span style="font-size:.72rem;color:${c}">(${s}${p}%)</span>`;}return '';})()}</span></div>
    ${extRows}
    ${flex ? `<div class="summary-row"><span>🔒 FLEX</span><span>$${flex.toLocaleString('es-CL')}</span></div>` : ''}
    <div class="summary-row total"><span>TOTAL</span><span>$${total.toLocaleString('es-CL')}</span></div>
  </div>
  <div class="card">
    <div class="card-title">👤 Tus datos</div>
    <div class="form-group"><label>Nombre completo *</label>
      <input type="text" id="f-name" placeholder="Tu nombre" value="${S.customerName}">
    </div>
    <div class="form-group"><label>Telefono / WhatsApp *</label>
      <input type="tel" id="f-phone" placeholder="+56 9 xxxx xxxx" value="${S.customerPhone}">
    </div>
    <div class="form-group"><label>Email (opcional)</label>
      <input type="email" id="f-email" placeholder="tu@email.com" value="${S.customerEmail}">
    </div>
    <div class="form-group"><label>Fecha de nacimiento <span style="font-weight:400;opacity:.65">(opcional — para saludarte en tu día 🎂)</span></label>
      <input type="date" id="f-birthday" max="${new Date().toISOString().split('T')[0]}" value="${S.customerBirthday||''}">
    </div>
  </div>
  <button class="btn" onclick="submitBooking()">Ir a pagar 💳</button>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderExtras()">Volver</button>`;
}

async function submitBooking(){
  S.customerName = $('f-name').value.trim();
  S.customerPhone = $('f-phone').value.trim();
  S.customerEmail = $('f-email').value.trim();
  S.customerBirthday = ($('f-birthday')?.value||'').trim()||null;
  if(!S.customerName || !S.customerPhone){
    showToast('Por favor ingresa nombre y telefono');
    return;
  }
  const pp = S.prices[S.numPeople] || 69990;
  const sub = pp * S.numPeople;
  const extrasArr = EXTRAS_CATALOG.filter(e=>S.extras[e.id]).map(e=>({name:e.name,price:e.price,quantity:1}));
  const extTotal = extrasArr.reduce((a,e)=>a+e.price,0);
  const flex = S.hasFlex ? Math.round(sub*0.1) : 0;
  const total = sub + extTotal + flex;

  mc.innerHTML = `<div class="card" style="text-align:center">
    <div style="font-size:2rem;margin:1rem">⏳</div>
    <p>Creando tu reserva...</p>
  </div>`;

  try{
    // Support ?test_price=100 in URL for payment testing
    const testPrice = new URLSearchParams(location.search).get('test_price');
    const payload = {
      customer_name: S.customerName,
      customer_phone: S.customerPhone,
      customer_email: S.customerEmail || null,
      customer_birthday: S.customerBirthday || null,
      booking_date: S.selectedDate,
      booking_time: S.selectedTime,
      num_people: S.numPeople,
      extras: extrasArr,
      has_flex: S.hasFlex,
    };
    if(testPrice) payload.test_price = parseInt(testPrice);

    const r = await fetch('/api/booking/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.detail || 'Error');
    S.bookingRef = data.booking_ref;
    S.paymentUrl = data.payment_url;
    S.totalPrice = total;
    renderPayment();
  }catch(e){
    mc.innerHTML = `<div class="card"><p style="color:red">Error: ${e.message}</p></div>`;
  }
}

function renderPayment(){
  const [yr,mo,dy] = S.selectedDate.split('-');
  mc.innerHTML = `
  ${stepsHtml('pago')}
  <div class="card" style="text-align:center">
    <div class="card-title">💳 Pagar reserva</div>
    <p style="color:var(--muted);margin-bottom:.8rem">Ref: <strong>${S.bookingRef}</strong></p>
    <div class="price-tag" style="margin:1rem 0">
      <div class="price-big">$${S.totalPrice.toLocaleString('es-CL')}</div>
      <div class="price-sub">${S.numPeople} personas · ${dy}/${mo}/${yr} ${S.selectedTime}</div>
    </div>
    ${S.paymentUrl ? `
      <a href="${S.paymentUrl}" class="btn" style="text-decoration:none;margin-top:.5rem">
        Pagar con MercadoPago 💳
      </a>
      <p style="color:var(--muted);font-size:.8rem;margin-top:.8rem">
        Pago seguro · Debito, credito, Webpay y mas
      </p>` : `
      <div class="info-box">
        ✅ Reserva creada! Nos contactaremos a tu WhatsApp para coordinar el pago.
      </div>`}
  </div>
  <button class="btn btn-secondary" style="margin-top:.5rem" onclick="renderMenu()">Volver al inicio</button>`;
}

function checkReturnFromPayment(){
  const params = new URLSearchParams(window.location.search);
  const ref = params.get('booking_ref');
  const status = params.get('collection_status') || params.get('payment_status');
  if(ref && status==='approved'){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">🎉</div>
      <div class="card-title">Reserva Confirmada!</div>
      <p style="color:var(--muted);margin:.5rem 0">Ref: <strong>${ref}</strong></p>
      <div class="info-box" style="margin-top:1rem">
        Te enviaremos los detalles por WhatsApp. Nos vemos en el lago! 🚤🔥
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">Nueva reserva</button>`;
    return true;
  }
  if(ref && (status==='failure'||status==='rejected')){
    mc.innerHTML = `
    <div class="card" style="text-align:center">
      <div class="success-icon">❌</div>
      <div class="card-title">Pago no completado</div>
      <div class="info-box" style="margin-top:1rem">
        Tu reserva (${ref}) fue guardada. Puedes intentar el pago nuevamente o contactarnos.
      </div>
    </div>
    <button class="btn" style="margin-top:1rem" onclick="renderMenu()">Volver</button>`;
    return true;
  }
  return false;
}

async function init(){
  if(!checkReturnFromPayment()){
    mc.innerHTML = `<div class="card" style="text-align:center"><p>Cargando...</p></div>`;
    await Promise.all([loadPricesAndAvail(), loadDynamicContent()]);
    renderMenu();

    // Show test mode banner
    const tp = new URLSearchParams(location.search).get('test_price');
    if(tp){
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f0a500;color:#0a1628;'+
        'text-align:center;padding:.4rem;font-weight:700;font-size:.85rem;z-index:9999;';
      banner.textContent = `🧪 MODO TEST — el pago se procesará por $${parseInt(tp).toLocaleString('es-CL')} CLP`;
      document.body.prepend(banner);
    }
  }
}

init();
</script>
</body>
</html>
