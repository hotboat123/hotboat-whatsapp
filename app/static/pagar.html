<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HotBoat Chile · Pagar Reserva</title>
<!--META_PIXEL_HEAD-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1ea;--deep:#fbfaf6;--blue:#e7efea;
  --coral:#2c7a72;--gold:#235e58;
  --text:#2a322e;--muted:#6f7d79;
  --card:#ffffff;--border:#e3e9e6;
  --green:#23766b;
}
body{font-family:'Raleway',sans-serif;
  background:radial-gradient(900px 460px at 50% -8%, rgba(44,122,114,.08), transparent 60%), var(--bg);
  color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}

.site-logo{display:block;margin:0 auto 2rem;height:120px;width:auto;filter:brightness(0)}
.boat-emoji{display:none}

.card{background:var(--card);border:1px solid var(--border);border-radius:22px;
  width:100%;max-width:420px;padding:2rem;
  box-shadow:0 22px 48px -24px rgba(31,42,40,.30), 0 6px 16px -10px rgba(31,42,40,.14)}

.rsv-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(44,122,114,.10);
  color:#235e58;border:1px solid rgba(44,122,114,.30);border-radius:30px;
  padding:.3rem .9rem;font-size:.75rem;font-weight:700;letter-spacing:.05em;margin-bottom:1.2rem}

.rsv-title{font-family:'Lora',serif;font-size:1.4rem;font-weight:700;margin-bottom:.2rem;line-height:1.3;color:#235e58}
.rsv-sub{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem}

.detail-row{display:flex;align-items:center;gap:.7rem;padding:.65rem 0;
  border-bottom:1px solid #eef0ec;font-size:.88rem}
.detail-row:last-of-type{border-bottom:none}
.detail-icon{font-size:1.1rem;width:1.6rem;text-align:center;flex-shrink:0}
.detail-label{color:var(--muted);flex:1}
.detail-val{font-weight:600;text-align:right}

.divider{height:1px;background:var(--border);margin:1.4rem 0}

.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.total-label{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.total-amount{font-family:'Lora',serif;font-size:1.8rem;font-weight:700;color:#235e58}

.btn-pay{display:block;width:100%;padding:1rem;
  background:linear-gradient(180deg,#34897f,#2c7a72);
  color:#fff;border:none;border-radius:50px;font-size:1.05rem;font-weight:700;
  cursor:pointer;text-align:center;text-decoration:none;letter-spacing:.03em;
  transition:transform .15s,box-shadow .15s;box-shadow:0 10px 22px -10px rgba(44,122,114,.6)}
.btn-pay:hover{transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(44,122,114,.65)}
.btn-pay:active{transform:translateY(0)}

.security-note{display:flex;align-items:center;justify-content:center;gap:.4rem;
  font-size:.72rem;color:var(--muted);margin-top:.9rem}
.security-note span{font-size:.9rem}

.loading{text-align:center;color:var(--muted);padding:2rem}
.error-msg{background:rgba(44,122,114,.08);border:1px solid rgba(44,122,114,.3);
  border-radius:12px;padding:1rem;color:#235e58;font-size:.85rem;text-align:center;margin-top:1rem}
</style>
</head>
<body>

<img src="/static/Logo sin Fondo y sin CHILE.png" alt="HotBoat" class="site-logo">

<div class="card" id="main-card">
  <div class="loading" id="loading-state">Cargando tu reserva...</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const orderId  = params.get('order_id');
const key      = params.get('key');
const wooUrl   = params.get('woo_url');   // direct WooCommerce payment URL (fallback)

async function init(){
  const card = document.getElementById('main-card');

  if(!orderId && !wooUrl){
    card.innerHTML = '<div class="error-msg">Link de pago inválido.</div>';
    return;
  }

  let orderData = null;
  if(orderId){
    try{
      const r = await fetch(`/api/pago/order/${orderId}`);
      if(r.ok) orderData = await r.json();
    }catch(e){ console.warn('Could not fetch order:', e); }
  }

  const payUrl = wooUrl || (orderData?.payment_url) ||
    `https://hotboatchile.com/checkout/order-pay/${orderId}/?pay_for_order=true&key=${key||''}`;

  const nombre   = orderData?.billing?.first_name || '';
  const feeLines = orderData?.fee_lines || [];
  const total    = orderData?.total ? parseInt(orderData.total) : null;

  // Build fee line rows (each is a 50% deposit line item)
  const feeRows = feeLines.map(fl => {
    const depositAmt = parseInt(fl.total || '0');
    const fullAmt = depositAmt * 2;  // fee_line stores the 50% deposit; show full price here
    return `<div class="detail-row">
      <span class="detail-icon">📋</span>
      <span class="detail-label" style="font-size:.83rem">${fl.name}</span>
      <span class="detail-val" style="white-space:nowrap">$${fullAmt.toLocaleString('es-CL')}</span>
    </div>`;
  }).join('');

  // Fallback rows if no fee_lines (older orders)
  const fecha    = orderData?.meta?.fecha || '';
  const personas = orderData?.meta?.personas || '';
  const hora     = orderData?.meta?.hora || '';
  const fallbackRows = feeLines.length === 0 ? `
    ${fecha?`<div class="detail-row"><span class="detail-icon">📅</span><span class="detail-label">Fecha</span><span class="detail-val">${fecha}</span></div>`:''}
    ${hora?`<div class="detail-row"><span class="detail-icon">⏰</span><span class="detail-label">Hora</span><span class="detail-val">${hora}</span></div>`:''}
    ${personas?`<div class="detail-row"><span class="detail-icon">👥</span><span class="detail-label">Personas</span><span class="detail-val">${personas}</span></div>`:''}
  ` : '';

  card.innerHTML = `
    <div class="rsv-badge">🎟️ RESERVA CONFIRMADA</div>
    <div class="rsv-title">¡Hola${nombre?' '+nombre:''}! Tu lugar está reservado 🎉</div>
    <div class="rsv-sub">Solo falta completar el pago para asegurar tu lugar.</div>

    ${feeRows || fallbackRows}

    <div class="divider"></div>

    <div style="background:rgba(44,122,114,.08);border:1px solid rgba(44,122,114,.25);border-radius:10px;
      padding:.6rem .9rem;margin-bottom:1.2rem;font-size:.8rem;color:#235e58;line-height:1.5">
      🔑 Se cobra el <strong>50% ahora</strong> para reservar. El saldo restante
      se paga al terminar la experiencia HotBoat, en efectivo o transferencia.
    </div>

    <div class="total-row">
      <span class="total-label">Depósito ahora (50%)</span>
      <span class="total-amount">$${total !== null ? total.toLocaleString('es-CL') : '—'}</span>
    </div>

    <a href="${payUrl}" class="btn-pay">💳 Pagar ahora</a>

    <div class="security-note">
      <span>🔒</span> Pago seguro · Webpay Plus · Mercado Pago
    </div>
  `;
  if (typeof fbq === 'function') {
    const chk = { currency: 'CLP' };
    if (total !== null && !Number.isNaN(total)) chk.value = total;
    fbq('track', 'InitiateCheckout', chk);
  }
}
init();
</script>
</body>
</html>
